<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Famo Trading — Onboarding Mohsen</title>
<link rel="stylesheet" href="/staff.css">
<style>
:root{--ink:#111;--muted:#666;--line:#e6e6e6;--soft:#f6f6f4;--ok:#28734d;--warn:#9a6700;--brand:#235e86}
body{margin:0;background:#f0f0ee;color:var(--ink)}
.ob-login{min-height:100vh;display:grid;place-items:center;padding:24px}
.ob-login>div{width:min(100%,420px);padding:32px 28px;border:1px solid var(--line);border-radius:18px;background:#fff}
.ob-login h1{margin:0 0 6px;font-size:24px;letter-spacing:-.03em}
.ob-login p{margin:0 0 20px;color:var(--muted);line-height:1.5;font-size:14px}
.ob-login input{width:100%;height:46px;padding:0 14px;margin:0 0 10px;border:1px solid #ddd;border-radius:10px}
.ob-login button{width:100%;height:46px;border:0;border-radius:10px;background:#111;color:#fff;font-weight:600;cursor:pointer}
.ob-err{min-height:18px;margin-top:8px;color:#b23b2e;font-size:13px}
.ob-shell{min-height:100vh;display:grid;grid-template-columns:280px 1fr;background:#f4f4f4}
.ob-side{background:#fbfbfa;color:#111;padding:28px 22px;display:flex;flex-direction:column;gap:8px;border-right:1px solid var(--line)}
.ob-side .brand{display:flex;align-items:center;gap:10px;font-weight:700;margin-bottom:18px;color:#111}
.ob-side .brand span{width:32px;height:32px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center}
.ob-stepbtn{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:12px;border:0;background:transparent;color:#666;text-align:left;cursor:pointer;width:100%}
.ob-stepbtn:hover{background:#ededeb;color:#111}
.ob-stepbtn.on{background:#e9e9e7;color:#111}
.ob-stepbtn .n{flex:0 0 28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;background:#e4e4e4;color:#555}
.ob-stepbtn.on .n{background:var(--brand);color:#fff}
.ob-stepbtn.done .n{background:var(--ok);color:#fff}
.ob-stepbtn small{display:block;color:#888;margin-top:2px;font-size:11px}
.ob-main{padding:28px clamp(18px,4vw,48px) 64px;max-width:920px;background:#fff}
.ob-hero{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:center;margin-bottom:22px;padding:22px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(135deg,#fff 0%,#f3f7fa 100%)}
.ob-hero h1{margin:0 0 8px;font-size:28px;letter-spacing:-.035em}
.ob-hero p{margin:0;color:var(--muted);line-height:1.55}
.ob-art{aspect-ratio:4/3;border-radius:16px;background:
  radial-gradient(circle at 30% 30%,#d7e8f3,transparent 45%),
  radial-gradient(circle at 70% 60%,#e8f3ea,transparent 40%),
  linear-gradient(160deg,#f0f0ee,#d7e3ea);display:grid;place-items:center;color:#235e86;position:relative;overflow:hidden}
.ob-art b{font-size:42px;letter-spacing:-.05em;position:relative;z-index:1}
.ob-art::after{content:"";position:absolute;inset:18% 12%;border:1px solid rgba(35,94,134,.18);border-radius:18px}
.ob-card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:22px}
.ob-card h2{margin:0 0 6px;font-size:18px}
.ob-card .lead{margin:0 0 18px;color:var(--muted);font-size:13.5px;line-height:1.5}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ob-grid .full{grid-column:1/-1}
label.fld{display:block;font-size:12px;color:#777;margin:0 0 5px}
input.fld,select.fld,textarea.fld{width:100%;min-height:44px;padding:10px 12px;border:1px solid #ddd;border-radius:10px;background:#fff;font:inherit}
textarea.fld{min-height:84px;resize:vertical}
.ob-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.ob-btn{min-height:44px;padding:0 16px;border-radius:10px;border:1px solid #111;background:#111;color:#fff;font-weight:600;cursor:pointer}
.ob-btn.sec{background:#fff;color:#111;border-color:#ddd}
.ob-btn:disabled{opacity:.5;cursor:default}
.ob-list{margin-top:18px;border-top:1px solid #eee}
.ob-row{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
.ob-row b{font-size:14px}.ob-row span{color:#777;font-size:12.5px}
.ob-row .grow{flex:1;min-width:0}
.cred{margin-top:14px;padding:14px;border-radius:12px;background:#111;color:#fff}
.cred code{display:block;font:600 15px Geist Mono,ui-monospace,monospace;margin-top:4px}
.cred small{color:#aaa}
.toast{position:fixed;right:18px;bottom:18px;max-width:min(420px,calc(100vw - 24px));padding:12px 14px;border-radius:12px;background:#111;color:#fff;font-size:13px;z-index:50;display:none;white-space:pre-line}
.toast.err{background:#8f2e22}
.progress{height:8px;border-radius:99px;background:#e8e8e8;overflow:hidden;margin:10px 0 0}
.progress>i{display:block;height:100%;background:var(--ok);width:0;transition:width .25s}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:3px 8px;border-radius:99px;background:#f0f0f0;color:#555}
.badge.ok{background:#e6f4ec;color:var(--ok)}
.hint{font-size:12px;color:#888;margin-top:8px;line-height:1.45}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
.chip{min-height:40px;padding:0 14px;border:1px solid #ddd;border-radius:999px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#444}
.chip.on{background:#111;border-color:#111;color:#fff}
.quick{display:grid;grid-template-columns:minmax(140px,1.4fr) auto minmax(90px,.7fr) minmax(80px,.55fr) auto;gap:8px;align-items:end;padding:14px;border:1px dashed #cfcfcf;border-radius:14px;background:#fafafa;margin-bottom:16px}
.quick .q-lab{font-size:11px;color:#888;margin:0 0 4px}
.prod-table{width:100%;border-collapse:collapse;margin-top:8px}
.prod-table th{text-align:left;font-size:11px;color:#888;font-weight:600;padding:8px 6px;border-bottom:1px solid #eee}
.prod-table td{padding:8px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.prod-table input,.prod-table select{width:100%;min-height:40px;padding:0 10px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;font:inherit}
.prod-table .act{white-space:nowrap}
.prod-table .act button{min-height:36px;padding:0 10px;margin-left:4px}
.cat-suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.cat-suggest button{min-height:32px;padding:0 10px;border:1px solid #e4e4e4;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;color:#555}
@media(max-width:860px){
  .ob-shell{grid-template-columns:1fr}
  .ob-side{position:sticky;top:0;z-index:20;padding:14px;flex-direction:row;overflow:auto;gap:6px}
  .ob-side .brand{display:none}
  .ob-stepbtn{min-width:150px;padding:10px}
  .ob-hero{grid-template-columns:1fr}
  .ob-grid{grid-template-columns:1fr}
  .quick{grid-template-columns:1fr 1fr;align-items:stretch}
  .quick .q-name{grid-column:1/-1}
  .quick .q-go{grid-column:1/-1}
  .prod-table thead{display:none}
  .prod-table,.prod-table tbody,.prod-table tr,.prod-table td{display:block;width:100%}
  .prod-table tr{padding:12px 0;border-bottom:1px solid #eee}
  .prod-table td{border:0;padding:4px 0}
  .prod-table td::before{content:attr(data-label);display:block;font-size:11px;color:#888;margin-bottom:3px}
}
</style>
</head>
<body>
<section id="login" class="ob-login"><div>
  <h1>Welkom Mohsen</h1>
  <p>Vul in 6 korte stappen alles in wat Famo nodig heeft. Geen Airtable — alles hier op het platform.</p>
  <input id="code" type="password" placeholder="Personeelscode" autocomplete="current-password">
  <button type="button" onclick="enter()">Start onboarding</button>
  <div id="err" class="ob-err"></div>
</div></section>

<div id="app" class="ob-shell hidden">
  <aside class="ob-side" aria-label="Onboarding stappen">
    <div class="brand"><span>F</span> Famo onboarding</div>
    <a href="/aan-de-slag.html" aria-current="page" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Aan de slag</a>
    <button type="button" class="ob-stepbtn" data-step="0" onclick="go(0)"><span class="n">1</span><div><b>Bedrijf</b><small>Naam, BTW, IBAN</small></div></button>
    <button type="button" class="ob-stepbtn" data-step="1" onclick="go(1)"><span class="n">2</span><div><b>Producten</b><small>Catalogus + voorraad</small></div></button>
    <button type="button" class="ob-stepbtn" data-step="2" onclick="go(2)"><span class="n">3</span><div><b>Klanten</b><small>Login automatisch</small></div></button>
    <button type="button" class="ob-stepbtn" data-step="3" onclick="go(3)"><span class="n">4</span><div><b>Prijzen</b><small>Afgesproken tarieven</small></div></button>
    <button type="button" class="ob-stepbtn" data-step="4" onclick="go(4)"><span class="n">5</span><div><b>Wachtwoorden</b><small>Wijzigen / opnieuw</small></div></button>
    <button type="button" class="ob-stepbtn" data-step="5" onclick="go(5)"><span class="n">6</span><div><b>Klaar</b><small>Testbestelling</small></div></button>
    <div style="margin-top:auto;padding-top:18px">
      <div class="progress" aria-hidden="true"><i id="bar"></i></div>
      <div style="margin-top:8px;font-size:12px;color:#888" id="barLabel">0/5 basisstappen</div>
      <button type="button" class="ob-btn sec" style="width:100%;margin-top:12px" onclick="logout()">Uitloggen</button>
    </div>
  </aside>

  <main class="ob-main">
    <header class="ob-hero">
      <div>
        <h1 id="heroTitle">Bedrijfsgegevens</h1>
        <p id="heroLead">Eén scherm per stap. Bewaar, ga verder. Groen = klaar.</p>
        <div style="margin-top:12px"><span class="badge" id="heroBadge">stap 1/6</span></div>
      </div>
      <div class="ob-art" id="heroArt" aria-hidden="true"><b>01</b></div>
    </header>
    <div id="panel" class="ob-card"><div class="staff-skeleton" style="max-width:240px;margin:20px auto"></div></div>
  </main>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let DATA=null, STEP=0, BUSY=false, LAST_CREDS=null, UNIT="kassa", EDIT_ID=null, PROD_Q="";
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
const unitOut=u=>window.famoNL?famoNL.unit(u):u;

const STEPS=[
  {t:"Bedrijfsgegevens", lead:"Officiële gegevens voor documenten en facturen. IBAN + BIC zijn verplicht om te kunnen afdrukken."},
  {t:"Producten & voorraad", lead:"Voeg producten toe met eenheid en basisprijs. Voorraad start hier meteen mee."},
  {t:"Klanten & logins", lead:"Maak een klant aan. Het platform genereert automatisch gebruikersnaam en wachtwoord."},
  {t:"Afgesproken prijzen", lead:"Koppel een speciale prijs aan een klant + product. Anders geldt de basisprijs."},
  {t:"Wachtwoorden beheren", lead:"Bekijk logins en genereer een nieuw wachtwoord wanneer nodig."},
  {t:"U bent klaar", lead:"Controleer de status en plaats één testbestelling van A tot Z."}
];

function toast(msg,err){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="toast"+(err?" err":""); el.style.display="block";
  clearTimeout(toast._t); toast._t=setTimeout(()=>{el.style.display="none"},4200);
}

async function enter(){
  const input=document.getElementById("code"), err=document.getElementById("err");
  const code=(input.value||"").trim();
  if(!code){err.textContent="Vul de personeelscode in.";return}
  if(BUSY)return; BUSY=true; err.textContent="Controleren…";
  try{
    await famoStaff.login(code);
    input.value="";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await refresh();
    go(firstOpenStep());
  }catch(e){err.textContent=famoStaff.translateError(e.message||e)}
  finally{BUSY=false}
}

async function logout(){await famoStaff.logout();location.reload()}

async function refresh(){
  DATA=await famoStaff.apiJson("/api/onboarding");
  paintSide();
}

function firstOpenStep(){
  const s=DATA.status||{};
  if(!s.identiteit)return 0;
  if(!s.catalogue)return 1;
  if(!s.clients)return 2;
  if(!s.prijzen)return 3;
  return 4;
}

function paintSide(){
  const s=DATA.status||{};
  const done=[!!s.identiteit, s.catalogue>0, s.clients>0, s.prijzen>0, s.credentials>0];
  const n=done.filter(Boolean).length;
  document.getElementById("bar").style.width=(n/5*100)+"%";
  document.getElementById("barLabel").textContent=n+"/5 basisstappen klaar";
  document.querySelectorAll(".ob-stepbtn").forEach(btn=>{
    const i=+btn.dataset.step;
    btn.classList.toggle("on", i===STEP);
    btn.classList.toggle("done", i<5 && done[i]);
  });
}

function go(i){
  STEP=i;
  const meta=STEPS[i];
  document.getElementById("heroTitle").textContent=meta.t;
  document.getElementById("heroLead").textContent=meta.lead;
  document.getElementById("heroBadge").textContent="stap "+(i+1)+"/6";
  document.getElementById("heroArt").innerHTML="<b>0"+(i+1)+"</b>";
  paintSide();
  render();
}

function render(){
  const box=document.getElementById("panel");
  if(!DATA){box.innerHTML="Laden…";return}
  if(STEP===0) return renderCompany(box);
  if(STEP===1) return renderProducts(box);
  if(STEP===2) return renderClients(box);
  if(STEP===3) return renderPrices(box);
  if(STEP===4) return renderPasswords(box);
  return renderDone(box);
}

function renderCompany(box){
  const c=DATA.config||{};
  box.innerHTML='<h2>1. Bedrijf</h2><p class="lead">Alles wat op leverbon en factuur moet staan.</p>'+
    '<div class="ob-grid">'+
    fld("bedrijfsnaam","Bedrijfsnaam *",c.bedrijfsnaam)+
    fld("btw","BTW-nummer *",c.btw)+
    fld("adres","Adres",c.adres,"full")+
    fld("plaats","Postcode en plaats",c.plaats,"full")+
    fld("telefoon","Telefoon",c.telefoon)+
    fld("email","E-mail",c.email)+
    fld("iban","IBAN *",c.iban)+
    fld("bic","BIC *",c.bic)+
    '</div><div class="ob-actions"><button class="ob-btn" onclick="saveCompany()">Opslaan en verder</button></div>'+
    '<p class="hint">'+(DATA.status.identiteit?'<span class="badge ok">klaar</span> Bedrijfsgegevens compleet.':'IBAN/BIC ontbreken nog of zijn onvolledig.')+'</p>';
}

function fld(id,lab,val,extra){
  return '<div class="'+(extra||'')+'"><label class="fld" for="'+id+'">'+lab+'</label><input class="fld" id="'+id+'" value="'+esc(val||'')+'"></div>';
}

async function saveCompany(){
  if(BUSY)return; BUSY=true;
  try{
    DATA=await famoStaff.apiJson("/api/onboarding",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      action:"saveConfig",
      bedrijfsnaam:val("bedrijfsnaam"), btw:val("btw"), adres:val("adres"), plaats:val("plaats"),
      telefoon:val("telefoon"), email:val("email"), iban:val("iban"), bic:val("bic")
    })});
    toast("Bedrijf opgeslagen");
    go(1);
  }catch(e){toast(famoStaff.translateError(e.message),true)}
  finally{BUSY=false}
}

function stockFor(name){
  const norm=s=>String(s||"").toLowerCase().trim();
  return (DATA.stock||[]).find(s=>norm(s.product)===norm(name))||null;
}

function categories(){
  const set=new Set((DATA.products||[]).map(p=>p.cat).filter(Boolean));
  ["Poisson","Crustacés","Coquillages","Diepvries","Algemeen"].forEach(c=>set.add(c));
  return [...set];
}

function setUnit(u){
  UNIT=u;
  document.querySelectorAll("[data-unit]").forEach(b=>b.classList.toggle("on", b.dataset.unit===u));
  const hidden=document.getElementById("punite");
  if(hidden) hidden.value=u;
}

function setCat(c){
  const el=document.getElementById("pcat");
  if(el) el.value=c;
}

function renderProducts(box){
  const q=PROD_Q.trim().toLowerCase();
  const list=(DATA.products||[]).filter(p=>!q||(p.nom+" "+(p.cat||"")).toLowerCase().includes(q));
  const stockMap=Object.fromEntries((DATA.stock||[]).map(s=>[String(s.product||"").toLowerCase(),s]));
  const cats=categories();
  const unitChips=["kassa","stuk","kg"].map(u=>'<button type="button" class="chip'+(UNIT===u?" on":"")+'" data-unit="'+u+'" onclick="setUnit(\''+u+'\')">'+u+'</button>').join("");
  const catBtns=cats.map(c=>'<button type="button" data-cat="'+esc(c)+'" onclick="setCat(this.dataset.cat)">'+esc(c)+'</button>').join("");

  const rows=list.map(p=>{
    const st=stockMap[String(p.nom||"").toLowerCase()]||{quantity:0,lowThreshold:0};
    const uDisp=unitOut(p.unite);
    return '<tr data-id="'+esc(p.id)+'">'+
      '<td data-label="Product"><input id="n_'+esc(p.id)+'" value="'+esc(p.nom)+'"></td>'+
      '<td data-label="Eenheid"><select id="u_'+esc(p.id)+'">'+
        ["kassa","stuk","kg","doos"].map(u=>{
          const sel=(String(uDisp).toLowerCase()===u || (u==="kassa" && /caisse/i.test(p.unite)))?" selected":"";
          return '<option value="'+u+'"'+sel+'>'+u+'</option>';
        }).join("")+
      '</select></td>'+
      '<td data-label="Prijs €"><input id="b_'+esc(p.id)+'" inputmode="decimal" value="'+esc(String(p.base).replace(".",","))+'"></td>'+
      '<td data-label="Voorraad"><input id="s_'+esc(p.id)+'" inputmode="decimal" value="'+esc(String(st.quantity).replace(".",","))+'"></td>'+
      '<td data-label="Drempel"><input id="l_'+esc(p.id)+'" inputmode="decimal" value="'+esc(String(st.lowThreshold||0).replace(".",","))+'"></td>'+
      '<td data-label="Categorie"><input id="c_'+esc(p.id)+'" value="'+esc(p.cat||"")+'" list="catlist"></td>'+
      '<td class="act" data-label=""><button type="button" class="ob-btn sec" onclick="saveProductRow(\''+esc(p.id)+'\')">Opslaan</button></td>'+
      '</tr>';
  }).join("")||'<tr><td colspan="7"><span>Nog geen producten — voeg er hierboven één toe.</span></td></tr>';

  box.innerHTML='<h2>2. Artikelen</h2><p class="lead">Snel toevoegen onderaan of rechts: naam → eenheid → prijs → voorraad → Enter. Bestaande rijen kunt u meteen aanpassen.</p>'+
    '<div class="quick">'+
      '<div class="q-name"><div class="q-lab">Productnaam</div><input class="fld" id="pnom" placeholder="Bv. Zalmfilet" autocomplete="off"></div>'+
      '<div><div class="q-lab">Eenheid</div><div class="chiprow" style="margin:0">'+unitChips+'</div><input type="hidden" id="punite" value="'+esc(UNIT)+'"></div>'+
      '<div><div class="q-lab">Prijs €</div><input class="fld" id="pbase" inputmode="decimal" placeholder="0,00"></div>'+
      '<div><div class="q-lab">Voorraad</div><input class="fld" id="pstock" inputmode="decimal" value="0"></div>'+
      '<div class="q-go"><div class="q-lab">&nbsp;</div><button class="ob-btn" type="button" id="padd" onclick="saveProduct()">+ Toevoegen</button></div>'+
    '</div>'+
    '<div class="ob-grid" style="margin-bottom:8px">'+
      '<div class="full"><label class="fld" for="pcat">Categorie</label><input class="fld" id="pcat" list="catlist" value="Algemeen"><div class="cat-suggest">'+catBtns+'</div></div>'+
      '<div class="full"><label class="fld" for="plow">Drempel laag (optioneel)</label><input class="fld" id="plow" inputmode="decimal" value="0"></div>'+
    '</div>'+
    '<datalist id="catlist">'+cats.map(c=>'<option value="'+esc(c)+'">').join("")+'</datalist>'+
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0 4px">'+
      '<input class="fld" style="flex:1;min-width:180px" id="psearch" placeholder="Zoek artikel…" value="'+esc(PROD_Q)+'" oninput="PROD_Q=this.value;render()">'+
      '<span class="badge">'+(DATA.products||[]).length+' artikelen</span>'+
      '<button type="button" class="ob-btn sec" onclick="go(2)">Volgende stap</button>'+
    '</div>'+
    '<div style="overflow:auto"><table class="prod-table"><thead><tr><th>Product</th><th>Eenheid</th><th>Prijs</th><th>Voorraad</th><th>Drempel</th><th>Categorie</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<p class="hint"><b>kassa</b> = hele doos · <b>kg</b> = decimale bestelling mogelijk · wijzigingen per rij met Opslaan.</p>';

  const nameEl=document.getElementById("pnom");
  if(nameEl){
    nameEl.focus();
    ["pnom","pbase","pstock","pcat","plow"].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();saveProduct()}});
    });
  }
}

async function saveProduct(){
  if(BUSY)return;
  const nom=val("pnom");
  if(!nom){toast("Vul een productnaam in",true);return}
  const base=Number(String(val("pbase")).replace(",","."));
  if(!Number.isFinite(base)||base<0){toast("Vul een geldige prijs in",true);return}
  BUSY=true;
  const btn=document.getElementById("padd");
  if(btn)btn.disabled=true;
  try{
    DATA=await famoStaff.apiJson("/api/onboarding",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      action:"saveProduct",
      nom, unite:val("punite")||UNIT, base,
      cat:val("pcat")||"Algemeen",
      stock:Number(String(val("pstock")||"0").replace(",",".")),
      lowThreshold:Number(String(val("plow")||"0").replace(",","."))
    })});
    toast("Artikel toegevoegd: "+nom);
    PROD_Q="";
    render();
  }catch(e){toast(famoStaff.translateError(e.message),true)}
  finally{BUSY=false;if(btn)btn.disabled=false}
}

async function saveProductRow(id){
  if(BUSY)return; BUSY=true;
  try{
    const nom=val("n_"+id);
    const unite=val("u_"+id);
    const base=Number(String(val("b_"+id)).replace(",","."));
    const stock=Number(String(val("s_"+id)).replace(",","."));
    const cat=val("c_"+id)||"Algemeen";
    if(!nom) throw new Error("Productnaam is verplicht");
    if(!Number.isFinite(base)||base<0) throw new Error("Ongeldige prijs");
    const lowThreshold=Number(String(val("l_"+id)||"0").replace(",","."));
    if(!Number.isFinite(lowThreshold)||lowThreshold<0) throw new Error("Ongeldige drempel");
    DATA=await famoStaff.apiJson("/api/onboarding",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      action:"saveProduct", id, nom, unite, base, cat, stock, lowThreshold
    })});
    toast("Artikel bijgewerkt");
    render();
  }catch(e){toast(famoStaff.translateError(e.message),true)}
  finally{BUSY=false}
}

function renderClients(box){
  const cred=LAST_CREDS?'<div class="cred"><small>Nieuwe login — noteer of stuur door</small><div>Gebruiker</div><code>'+esc(LAST_CREDS.user)+'</code><div style="margin-top:8px">Wachtwoord</div><code>'+esc(LAST_CREDS.password)+'</code><div style="margin-top:10px"><button class="ob-btn sec" type="button" onclick="copyCreds()">Kopiëren</button></div></div>':'';
  const rows=(DATA.clients||[]).map(c=>'<div class="ob-row"><div class="grow"><b>'+esc(c.nom)+'</b><br><span>login: '+esc(c.user||"—")+(c.hasPassword?' · wachtwoord gezet':' · nog geen wachtwoord')+'</span></div></div>').join("")||'<div class="ob-row"><span>Nog geen klanten.</span></div>';
  box.innerHTML='<h2>3. Klant + login</h2><p class="lead">Laat “Automatisch genereren” aan staan. U krijgt meteen de credentials te zien.</p>'+
    '<div class="ob-grid">'+
    fld("cnom","Klantnaam *","","full")+
    fld("cadresse","Leveradres","","full")+
    fld("ctel","Telefoon","")+
    fld("cbtw","BTW-nummer","")+
    fld("cklantnr","Klantnummer","")+
    '<div class="full"><label style="display:flex;gap:8px;align-items:center;font-size:13px"><input id="cgen" type="checkbox" checked> Automatisch gebruikersnaam + wachtwoord genereren</label></div>'+
    fld("cuser","Gebruikersnaam (optioneel)","")+
    fld("cpw","Wachtwoord (optioneel)","")+
    '</div><div class="ob-actions"><button class="ob-btn" onclick="saveClient()">Klant opslaan</button><button class="ob-btn sec" onclick="go(3)">Volgende stap</button></div>'+
    cred+'<div class="ob-list">'+rows+'</div>';
}

async function saveClient(){
  if(BUSY)return; BUSY=true;
  try{
    const d=await famoStaff.apiJson("/api/onboarding",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      action:"saveClient",
      nom:val("cnom"), adresse:val("cadresse"), tel:val("ctel"), btw:val("cbtw"), klantnr:val("cklantnr"),
      generate:document.getElementById("cgen").checked,
      user:val("cuser"), password:val("cpw")
    })});
    DATA=d; LAST_CREDS=d.credentials||null;
    toast("Klant opgeslagen — login klaar");
    render();
  }catch(e){toast(famoStaff.translateError(e.message),true)}
  finally{BUSY=false}
}

function copyCreds(){
  if(!LAST_CREDS)return;
  const t="Klant: "+LAST_CREDS.nom+"\nGebruiker: "+LAST_CREDS.user+"\nWachtwoord: "+LAST_CREDS.password+"\nPortaal: "+location.origin+"/";
  navigator.clipboard.writeText(t).then(()=>toast("Credentials gekopieerd")).catch(()=>toast(t));
}

function renderPrices(box){
  const clients=(DATA.clients||[]).map(c=>'<option value="'+esc(c.id)+'">'+esc(c.nom)+'</option>').join("");
  const products=(DATA.products||[]).map(p=>'<option value="'+esc(p.id)+'">'+esc(p.nom)+' (€ '+Number(p.base).toFixed(2).replace(".",",")+")"+'</option>').join("");
  const byC=Object.fromEntries((DATA.clients||[]).map(c=>[c.id,c.nom]));
  const byP=Object.fromEntries((DATA.products||[]).map(p=>[p.id,p.nom]));
  const rows=(DATA.prices||[]).map(p=>'<div class="ob-row"><div class="grow"><b>'+esc(byC[p.clientId]||p.clientId)+' → '+esc(byP[p.productId]||p.productId)+'</b><br><span>€ '+Number(p.prix).toFixed(2).replace(".",",")+'</span></div></div>').join("")||'<div class="ob-row"><span>Nog geen afgesproken prijzen.</span></div>';
  box.innerHTML='<h2>4. Afgesproken prijs</h2><p class="lead">Optioneel maar aangeraden voor vaste klanten.</p>'+
    '<div class="ob-grid">'+
    '<div><label class="fld">Klant</label><select class="fld" id="prClient">'+clients+'</select></div>'+
    '<div><label class="fld">Product</label><select class="fld" id="prProduct">'+products+'</select></div>'+
    fld("prPrix","Prijs € *","")+
    '</div><div class="ob-actions"><button class="ob-btn" onclick="savePrice()" '+(clients&&products?'':'disabled')+'>Prijs opslaan</button><button class="ob-btn sec" onclick="go(4)">Volgende stap</button></div>'+
    '<div class="ob-list">'+rows+'</div>';
}

async function savePrice(){
  if(BUSY)return; BUSY=true;
  try{
    DATA=await famoStaff.apiJson("/api/onboarding",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      action:"savePrice",
      clientId:val("prClient"), productId:val("prProduct"), prix:Number(String(val("prPrix")).replace(",","."))
    })});
    toast("Prijs opgeslagen");
    render();
  }catch(e){toast(famoStaff.translateError(e.message),true)}
  finally{BUSY=false}
}

function renderPasswords(box){
  const rows=(DATA.clients||[]).map(c=>'<div class="ob-row"><div class="grow"><b>'+esc(c.nom)+'</b><br><span>'+esc(c.user||"geen login")+'</span></div>'+
    '<button class="ob-btn sec" type="button" onclick="resetPw(\''+esc(c.id)+'\')">Nieuw wachtwoord</button></div>').join("")||'<div class="ob-row"><span>Eerst een klant aanmaken (stap 3).</span></div>';
  const cred=LAST_CREDS?'<div class="cred"><small>Laatst gegenereerd</small><div>Gebruiker</div><code>'+esc(LAST_CREDS.user)+'</code><div style="margin-top:8px">Wachtwoord</div><code>'+esc(LAST_CREDS.password)+'</code><div style="margin-top:10px"><button class="ob-btn sec" type="button" onclick="copyCreds()">Kopiëren</button></div></div>':'';
  box.innerHTML='<h2>5. Wachtwoorden</h2><p class="lead">Genereer een nieuw wachtwoord per klant. Het oude werkt dan niet meer.</p>'+
    cred+'<div class="ob-list">'+rows+'</div>'+
    '<div class="ob-actions"><button class="ob-btn sec" onclick="go(5)">Naar afronding</button></div>';
}

async function resetPw(id){
  if(BUSY)return; BUSY=true;
  try{
    const d=await famoStaff.apiJson("/api/onboarding",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"resetPassword",id})});
    DATA=d; LAST_CREDS=d.credentials||null;
    toast("Nieuw wachtwoord gegenereerd");
    render();
  }catch(e){toast(famoStaff.translateError(e.message),true)}
  finally{BUSY=false}
}

function renderDone(box){
  const s=DATA.status||{};
  const items=[
    ["Bedrijf", !!s.identiteit],
    ["Producten", s.catalogue>0, s.catalogue+" stuks"],
    ["Klanten", s.clients>0, s.clients+" stuks"],
    ["Prijzen", s.prijzen>0, s.prijzen+" stuks"],
    ["Logins", s.credentials>0, s.credentials+" klaar"]
  ];
  box.innerHTML='<h2>6. Klaar voor gebruik</h2><p class="lead">Als alles groen is: plaats één testbestelling via het klantportaal, bereid voor in Magazijn, bevestig levering, druk factuur.</p>'+
    '<div class="ob-list">'+items.map(x=>'<div class="ob-row"><div class="grow"><b>'+x[0]+'</b>'+(x[2]?'<br><span>'+esc(x[2])+'</span>':'')+'</div><span class="badge '+(x[1]?'ok':'')+'">'+(x[1]?'klaar':'te doen')+'</span></div>').join("")+'</div>'+
    '<div class="ob-actions">'+
    '<a class="ob-btn" href="/" target="_blank">Open klantportaal</a>'+
    '<a class="ob-btn sec" href="/entrepot.html">Open Magazijn</a>'+
    '<a class="ob-btn sec" href="/stock.html">Open Voorraad</a>'+
    '<a class="ob-btn sec" href="/bestellingen.html">Open Bestellingen</a>'+
    '</div><p class="hint">Personeelscode tijdelijk: famo2026 (tot u die later versterkt in Vercel). Facturen hier zijn intern — Peppol volgt via boekhouding.</p>';
}

function val(id){const el=document.getElementById(id);return el?el.value.trim():""}

document.getElementById("code").addEventListener("keydown",e=>{if(e.key==="Enter")enter()});
window.addEventListener("DOMContentLoaded",async()=>{
  try{
    if(await famoStaff.check()){
      document.getElementById("login").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      await refresh();
      go(firstOpenStep());
    }
  }catch(e){}
});
</script>
</body>
