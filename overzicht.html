<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Famo Trading — Overzicht</title><link rel="stylesheet" href="/staff.css"><style>
.dash-login{min-height:100vh;display:grid;place-items:center;padding:20px}.dash-login>div{width:min(100%,390px);padding:28px;border:1px solid #e8e8e8;border-radius:14px;background:#fff}.dash-login h1{margin:0 0 5px;font-size:20px}.dash-login p{color:#6b6b6b;font-size:13.5px}.dash-login input{width:100%;height:42px;padding:0 12px;margin:5px 0 9px}.dash-login button{width:100%;height:42px;border:0;border-radius:9px;background:#111;color:#fff}.dash-error{min-height:18px;margin-top:8px;color:#b23b2e;font-size:12.5px}.dash-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:26px}.dash-card{padding:16px;border:1px solid #e7e7e7;border-radius:11px;background:#fff;text-decoration:none;color:#111}.dash-card:hover{background:#fafafa;border-color:#d8d8d8}.dash-card b{display:block;font:500 24px Geist Mono,ui-monospace,monospace}.dash-card span{display:block;margin-top:4px;color:#666;font-size:13px}.dash-card small{display:block;margin-top:8px;color:#999;font-size:11.5px}.dash-grid{display:grid;grid-template-columns:1.25fr .85fr;gap:20px;margin-top:22px}.dash-panel{border:1px solid #e8e8e8;border-radius:12px;background:#fff}.dash-panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 9px}.dash-panel-head h2{margin:0;font-size:14.5px;font-weight:600}.dash-panel-head a{color:#235e86;font-size:12.5px;text-decoration:none}.dash-list{padding:0 18px 10px}.dash-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid #f0f0f0;text-decoration:none;color:#111}.dash-item-ref{font:500 12px Geist Mono,ui-monospace,monospace}.dash-item-client{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}.dash-item-meta{margin-left:auto;color:#777;font-size:12px;white-space:nowrap}.dash-empty{padding:18px;color:#888;font-size:12.5px}.dash-quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 18px 18px}.dash-quick a{display:flex;align-items:center;min-height:42px;padding:0 11px;border:1px solid #e4e4e4;border-radius:9px;color:#333;font-size:12.5px;text-decoration:none}.dash-quick a:hover{background:#fafafa}.dash-note{padding:12px 18px 18px;color:#888;font-size:12px;line-height:1.5}@media(max-width:820px){.dash-grid{grid-template-columns:1fr}.dash-cards{grid-template-columns:repeat(2,1fr)}}@media(max-width:480px){.dash-cards{grid-template-columns:1fr}.dash-quick{grid-template-columns:1fr}}
</style></head><body>
<section id="loginView" class="dash-login"><div><h1>Overzicht</h1><p>Meld u aan om de actuele operationele stand te zien.</p><input id="code" type="password" placeholder="Personeelscode" autocomplete="current-password"><button onclick="enter()">Aanmelden</button><div id="error" class="dash-error"></div></div></section>
<div id="app" class="hidden staff-shell"><aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside><nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav><main class="staff-main"><div class="staff-page"><header class="staff-page-head"><div><h1>Overzicht</h1><p>Operationele stand van vandaag, gebaseerd op de actuele gegevens.</p></div><div><button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div id="content" class="staff-loading"><div class="staff-skeleton" style="max-width:280px;margin:0 auto"></div></div></div></main></div>
<script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ORDERS=[],STOCK=[];
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
const eur=n=>"€ "+Number(n||0).toFixed(2).replace(".",",");
const dot={"Reçue":"#235e86","Prête":"#b4790f","Sortie en livraison":"#3a8a9c","Facturée":"#2e7d53"};
function day(v){return String(v||"").slice(0,10)}
function today(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Brussels"}).format(new Date())}
function status(o){return '<span class="staff-status" style="--status:'+dot[o.statut]+'">'+esc(famoNL.status(o.statut))+'</span>'}
function row(o){return '<a class="dash-item" href="/order.html?id='+encodeURIComponent(o.id)+'"><span class="dash-item-ref">'+esc(o.ref)+'</span><span class="dash-item-client">'+esc(o.client)+'</span>'+status(o)+'<span class="dash-item-meta">'+eur(o.total)+'</span></a>'}
async function enter(){
  const input=document.getElementById("code"),err=document.getElementById("error");
  const code=(input.value||"").trim();
  if(!code){err.textContent="Vul de personeelscode in.";return}
  if(enter._busy)return;enter._busy=true;
  err.textContent="Controleren…";
  try{
    await famoStaff.login(code);
    input.value="";
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await load();
  }catch(e){err.textContent=famoStaff.translateError(e.message||e)}
  finally{enter._busy=false}
}
async function load(){
  const content=document.getElementById("content");
  content.className="staff-loading";
  content.innerHTML='<div class="staff-skeleton" style="max-width:280px;margin:0 auto"></div>';
  try{
    const [a,b]=await Promise.all([famoStaff.api("/api/allorders"),famoStaff.api("/api/stock")]);
    const ad=await a.json().catch(()=>({})),bd=await b.json().catch(()=>({}));
    if(!a.ok)throw new Error(ad.error||"Overzicht kon niet worden geladen.");
    ORDERS=ad.orders||[];STOCK=b.ok?(bd.items||[]):[];render();
  }catch(err){
    content.className="staff-error";
    content.innerHTML=esc(famoStaff.translateError(err.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>';
  }
}
function render(){const t=today(),open=ORDERS.filter(o=>o.statut!=="Facturée"),due=ORDERS.filter(o=>day(o.dateLiv)===t&&o.statut!=="Facturée"),late=ORDERS.filter(o=>day(o.dateLiv)&&day(o.dateLiv)<t&&o.statut!=="Facturée"),low=STOCK.filter(x=>x.lowThreshold>0&&x.quantity<=x.lowThreshold),onway=ORDERS.filter(o=>o.statut==="Sortie en livraison"&&!o.livraisonConfirmee),unpaid=ORDERS.filter(o=>o.statut==="Facturée"&&o.paiement!=="Payé"),attention=ORDERS.filter(o=>(o.statut==="Prête"&&!o.preparationValidee)||(o.statut==="Sortie en livraison"&&!o.livraisonConfirmee));document.getElementById("content").className="";document.getElementById("content").innerHTML='<section class="dash-cards"><a class="dash-card" href="/bestellingen.html"><b>'+due.length+'</b><span>Bestellingen vandaag</span><small>Ontvangen en klaar voor vandaag</small></a><a class="dash-card" href="/bestellingen.html?status=Reçue"><b>'+open.length+'</b><span>Open in de workflow</span><small>Nog niet gefactureerd</small></a><a class="dash-card" href="/bestellingen.html?status=Sortie%20en%20livraison"><b>'+onway.length+'</b><span>Leveringen te bevestigen</span><small>Onderweg zonder ontvangst</small></a><a class="dash-card" href="/bestellingen.html?payment=En%20attente"><b>'+unpaid.length+'</b><span>Openstaande facturen</span><small>Gefactureerd, nog niet betaald</small></a><a class="dash-card" href="/stock.html"><b>'+low.length+'</b><span>Voorraad laag</span><small>Op of onder de ingestelde grens</small></a><a class="dash-card" href="/bestellingen.html"><b>'+late.length+'</b><span>Te late leveringen</span><small>Gevraagde datum is voorbij</small></a></section><section class="dash-grid"><section class="dash-panel"><header class="dash-panel-head"><h2>Aandacht vereist</h2><a href="/bestellingen.html">Alle bestellingen</a></header><div class="dash-list">'+(attention.length?attention.slice(0,6).map(row).join(""):'<div class="dash-empty">Geen open aandachtspunten op basis van de beschikbare statusgegevens.</div>')+'</div></section><section class="dash-panel"><header class="dash-panel-head"><h2>Snelle acties</h2></header><div class="dash-quick"><a href="/invoer.html">+ Bestelling invoeren</a><a href="/dagprep.html">Dagvoorbereiding</a><a href="/entrepot.html">Open magazijn</a><a href="/leveringen.html">Open leveringen</a><a href="/stock.html">Voorraad bijwerken</a><a href="/documenten.html">Documenten bekijken</a></div><div class="dash-note">Deze cockpit toont alleen indicatoren die uit de huidige bestellingen en voorraad kunnen worden afgeleid. Er wordt geen fictieve activiteit weergegeven.</div></section></section><section class="dash-panel" style="margin-top:20px"><header class="dash-panel-head"><h2>Recente bestellingen</h2><a href="/bestellingen.html">Open lijst</a></header><div class="dash-list">'+(ORDERS.length?ORDERS.slice(0,7).map(row).join(""):'<div class="dash-empty">Nog geen bestellingen beschikbaar.</div>')+'</div></section>'}
async function logout(){await famoStaff.logout();location.reload()}
document.getElementById("code").addEventListener("keydown",e=>{if(e.key==="Enter")enter()});
window.addEventListener("DOMContentLoaded",async()=>{
  try{
    if(await famoStaff.check()){
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      await load();
      return;
    }
  }catch(e){}
});
</script></body></html>
