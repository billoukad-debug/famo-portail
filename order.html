ine-height:1.5}.order-modal-box label{display:block;margin-top:14px;color:#555;font-size:12.5px}.order-modal-box input{display:block;width:100%;height:39px;margin-top:5px;padding:0 10px}.order-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}.order-modal-actions button{min-height:39px}.order-doc-modal .order-modal-box{width:min(100%,850px);height:min(86vh,880px);padding:0;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden}.doc-modal-top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #ececec}.doc-modal-top b{font-size:14px}.doc-modal-top button{min-height:35px}.order-doc-modal iframe{border:0;width:100%;height:100%}.order-feedback{margin-top:16px}.order-feedback .staff-error,.order-feedback .order-ok{padding:11px 13px;border-radius:9px;font-size:12.5px}.order-ok{border:1px solid #cfe5d7;background:#f4fbf6;color:#22633e}

<body>
<section id="loginView" class="order-login"><div class="order-login-card"><h1>Bestelling openen</h1><p>Gebruik uw personeelscode om de bestelling en acties te laden.</p><input id="code" type="password" autocomplete="current-password" placeholder="Personeelscode"><button onclick="enter()">Aanmelden</button><div id="loginError" class="order-login-error" role="alert"></div></div></section>
<div id="app" class="hidden staff-shell"><aside class="staff-sidebar" aria-label="Personeelsnavigatie"><a class="staff-logo" href="/overzicht.html"><span class="staff-logo-mark">F</span>Famo Trading</a><div class="staff-nav-label">Werkruimte</div><a class="staff-nav-link" href="/overzicht.html"><span class="staff-nav-icon overview"></span>Overzicht</a><a class="staff-nav-link active" href="/bestellingen.html"><span class="staff-nav-icon orders"></span>Bestellingen</a><a class="staff-nav-link" href="/entrepot.html"><span class="staff-nav-icon warehouse"></span>Magazijn</a><a class="staff-nav-link" href="/dagprep.html"><span class="staff-nav-icon pick"></span>Dagvoorbereiding</a><a class="staff-nav-link" href="/invoer.html"><span class="staff-nav-icon entry"></span>Invoeren</a><a class="staff-nav-link" href="/stock.html"><span class="staff-nav-icon stock"></span>Voorraad</a><a class="staff-nav-link" href="/documenten.html"><span class="staff-nav-icon docs"></span>Documenten</a><a class="staff-nav-link" href="/leveringen.html"><span class="staff-nav-icon delivery"></span>Leveringen</a><div class="staff-nav-spacer"></div><div class="staff-session"><span class="staff-session-avatar">PM</span><div><b>Personeel</b><small>Famo Trading</small></div><a href="#" onclick="logout();return false">Uitloggen</a></div></aside><nav class="staff-mobile-nav" aria-label="Mobiele navigatie"><a href="/overzicht.html">Famo</a><a href="/bestellingen.html">Bestellingen</a><a href="/entrepot.html">Magazijn</a><a href="/stock.html">Voorraad</a></nav><main class="staff-main"><div class="staff-page"><a class="order-back" href="/bestellingen.html">← Alle bestellingen</a><div id="state"></div><div id="content" class="hidden"></div></div></main></div>
<div id="modal" class="hidden"></div>
<script>
let CODE="",ORDER=null,STOCK=[],BUSY=false;const id=new URLSearchParams(location.search).get("id")||"";
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");const eur=n=>"€ "+Number(n||0).toFixed(2).replace(".",",");
const nl={"Reçue":"Ontvangen","Prête":"Klaar","Sortie en livraison":"Onderweg","Facturée":"Gefactureerd"},dot={"Reçue":"#235e86","Prête":"#b4790f","Sortie en livraison":"#3a8a9c","Facturée":"#2e7d53"};
function sourceOf(o){const m=String(o.notes||"").match(/^\[([^\]]+)\]/);return m?m[1]:"Klantportaal"}function cleanNote(o){return String(o.notes||"").replace(/^\[[^\]]+\]\s*/,"")}function dateLabel(v,withTime=false){if(!v)return"—";const d=new Date(v.includes("T")?v:v+"T00:00:00");return Number.isNaN(d)?v:d.toLocaleDateString("nl-BE",withTime?{dateStyle:"medium",timeStyle:"short"}:{day:"2-digit",month:"2-digit",year:"numeric"})}
function parseLines(txt){return String(txt||"").split("\n").filter(Boolean).map(raw=>{const m=raw.match(/^(.*?)\s*[×x]\s*([\d.,]+)\s*([^\[\(]*)(.*)$/);if(!m)return{name:raw,qty:"",unit:"",price:null,comment:""};const tail=m[4]||"",price=tail.match(/\[€\s*([\d.,]+)\]/),comment=tail.match(/\((.*?)\)/);return{name:m[1].trim(),qty:m[2],unit:m[3].trim(),price:price?Number(price[1].replace(",",".")):null,comment:comment?comment[1]:""}})}
async function enter(){CODE=document.getElementById("code").value.trim();const e=document.getElementById("loginError");if(!CODE){e.textContent="Vul de personeelscode in.";return}e.textContent="Controleren…";sessionStorage.setItem("famoStaffCode",CODE);document.getElementById("loginView").classList.add("hidden");document.getElementById("app").classList.remove("hidden");await load()}
async function load(){const state=document.getElementById("state"),content=document.getElementById("content");content.classList.add("hidden");state.innerHTML='<div class="staff-loading"><div class="staff-skeleton" style="max-width:240px;margin:0 auto"></div><div class="staff-skeleton" style="max-width:440px;margin:12px auto"></div></div>';try{const [ordersRes,stockRes]=await Promise.all([fetch("/api/allorders?code="+encodeURIComponent(CODE)),fetch("/api/stock?code="+encodeURIComponent(CODE))]);const ordersData=await ordersRes.json().catch(()=>({})),stockData=await stockRes.json().catch(()=>({}));if(!ordersRes.ok)throw new Error(ordersData.error||"Bestelling kon niet worden geladen.");ORDER=(ordersData.orders||[]).find(o=>o.id===id||o.ref===id)||null;STOCK=stockRes.ok?(stockData.items||[]):[];if(!ORDER)throw new Error("Deze bestelling bestaat niet of is niet meer beschikbaar.");state.innerHTML="";content.classList.remove("hidden");render()}catch(error){state.innerHTML='<div class="staff-error">'+esc(error.message||"Netwerkfout.")+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button></div>'}}
function stockInfo(){const lines=parseLines(ORDER.lignes),byName=new Map(STOCK.map(x=>[String(x.product||"").toLowerCase().trim(),x]));const issues=lines.map(l=>{const s=byName.get(l.name.toLowerCase());if(!s)return{type:"unknown",name:l.name};const requested=Number(String(l.qty).replace(",","."))||0;return s.quantity<requested?{type:"short",name:l.name,available:s.quantity,requested}:null}).filter(Boolean);return issues}
function render(){const o=ORDER,lines=parseLines(o.lignes),issues=stockInfo(),content=document.getElementById("content"),canDepart=o.statut==="Prête"&&o.preparationValidee;const events=[o.date&&['Bestelling aangemaakt',o.date,'#235e86'],o.prepareeLe&&['Voorbereiding gevalideerd',o.prepareeLe,'#b4790f'],o.stockAf&&['Vertrokken en voorraad afgeboekt',o.prepareeLe||o.livreeLe,'#3a8a9c'],o.livraisonConfirmee&&['Levering bevestigd door '+(o.receptionnePar||'klant'),o.livreeLe,'#2e7d53'],o.factureeLe&&['Factuur '+(o.factuurnummer||'aangemaakt'),o.factureeLe,'#2e7d53']].filter(Boolean);let action='';if(o.statut==="Reçue")action='<button class="staff-action" onclick="openWarehouse()">Voorbereiden in magazijn</button>';else if(o.statut==="Prête")action=o.preparationValidee?'<button class="staff-action" onclick="openDepartModal()">Vertrek bevestigen</button>':'<button class="staff-action" onclick="openWarehouse()">Validatie openen</button>';else if(o.statut==="Sortie en livraison")action='<button class="staff-action" onclick="openDeliveryModal()">Ontvangst bevestigen</button>';else action='<button class="staff-action-secondary" onclick="togglePaid()">'+(o.paiement==="Payé"?'Markeer als openstaand':'Markeer als betaald')+'</button>';content.innerHTML='<header class="order-heading"><div><h1>'+esc(o.ref)+'</h1><p>'+esc(o.client)+' · <span class="staff-status" style="--status:'+dot[o.statut]+'">'+nl[o.statut]+'</span></p></div><div class="order-actions">'+action+'<button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div class="order-meta"><div><b>Leverdatum</b>'+dateLabel(o.dateLiv)+'</div><div><b>Bron</b>'+esc(sourceOf(o))+'</div><div><b>Betaling</b>'+esc(o.paiement||"En attente")+'</div><div><b>Factuur</b>'+esc(o.factuurnummer||"Nog niet beschikbaar")+'</div></div><div id="feedback" class="order-feedback"></div><div class="order-grid"><section class="order-section"><h2>Artikelen</h2><p class="order-section-sub">De bewaarde prijzen en hoeveelheden zijn de bron voor documenten en voorraad.</p><div class="order-lines">'+lines.map(l=>'<div class="order-line"><div><div class="order-line-name">'+esc(l.name)+'</div>'+(l.comment?'<div class="order-line-note">'+esc(l.comment)+'</div>':'')+'</div><div class="order-line-qty">'+esc(l.qty)+' '+esc(l.unit)+'</div><div class="order-line-price">'+(l.price==null?'—':eur(l.price))+'</div></div>').join("")+'</div><div class="order-total"><span>Totaal</span><b>'+eur(o.total)+'</b></div>'+(cleanNote(o)?'<div class="order-note">'+esc(cleanNote(o))+'</div>':'')+'</section><aside class="order-side"><section class="order-section"><h2>Voorraad</h2>'+(o.stockAf?'<dl class="order-dl"><dt>Afboeking</dt><dd>Eenmalig uitgevoerd bij vertrek</dd><dt>Status</dt><dd>Voorraad vergrendeld voor deze bestelling</dd></dl>':issues.length?'<div class="order-note" style="background:#fff7f6;color:#9c3024">'+issues.map(x=>x.type==="unknown"?'Onbekend artikel: '+esc(x.name):esc(x.name)+': '+x.available+' beschikbaar, '+x.requested+' gevraagd').join("<br>")+'</div>':'<dl class="order-dl"><dt>Afboeking</dt><dd>Nog niet uitgevoerd</dd><dt>Controle</dt><dd>'+ (STOCK.length?'Geen tekort gevonden op basis van de huidige voorraad.':'Voorraad niet beschikbaar voor controle.')+'</dd></dl>')+'</section><section class="order-section"><h2>Levering</h2><dl class="order-dl"><dt>Vertrek</dt><dd>'+ (o.stockAf?'Bevestigd':'Nog niet vertrokken')+'</dd><dt>Ontvangen door</dt><dd>'+esc(o.receptionnePar||"—")+'</dd><dt>Geleverd om</dt><dd>'+dateLabel(o.livreeLe,true)+'</dd><dt>Bewijs</dt><dd>'+(o.preuveLivraison&&o.preuveLivraison.length?'<a href="'+esc(o.preuveLivraison[0].url)+'" target="_blank" rel="noopener">Open bewijs</a>':'—')+'</dd></dl></section><section class="order-section"><h2>Documenten</h2><div class="order-doc"><span class="order-doc-icon">▤</span><div class="order-doc-info"><b>Leveringsbon</b><span>'+ (o.statut==="Reçue"?'Beschikbaar na voorbereiding':'Interne afdruk')+'</span></div>'+(o.statut!=="Reçue"?'<button class="staff-action-secondary" onclick="openDocument(\'LB\')">Voorbeeld</button>':'')+'</div><div class="order-doc"><span class="order-doc-icon">▤</span><div class="order-doc-info"><b>Factuur</b><span>'+ (o.factuurnummer?esc(o.factuurnummer):'Geblokkeerd tot ontvangstbevestiging')+'</span></div>'+(o.factuurnummer?'<button class="staff-action-secondary" onclick="openDocument(\'FA\')">Voorbeeld</button>':'')+'</div></section></aside></div><section class="order-section" style="margin-top:20px"><h2>Activiteit</h2>'+(events.length?'<div class="order-timeline">'+events.map(x=>'<div class="order-event" style="--event:'+x[2]+'"><b>'+esc(x[0])+'</b> <time>· '+dateLabel(x[1],true)+'</time></div>').join("")+'</div>':'<div class="order-empty">Er is nog geen aanvullende activiteit beschikbaar voor deze bestelling.</div>')+'</section>'}
function openWarehouse(){location.href="/entrepot.html"}function feedback(message,error=false){document.getElementById("feedback").innerHTML='<div class="'+(error?'staff-error':'order-ok')+'">'+esc(message)+'</div>'}function modal(html,kind=""){const box=document.getElementById("modal");box.className="order-modal "+kind;box.innerHTML=html}function closeModal(){document.getElementById("modal").className="hidden";document.getElementById("modal").innerHTML=""}
function openDepartModal(){const issues=stockInfo();if(issues.length){feedback("Vertrek is geblokkeerd: los eerst de voorraadproblemen op in Voorraad of corrigeer de voorbereiding.",true);return}modal('<div class="order-modal-box"><h2>Vertrek bevestigen?</h2><p>De voorraad wordt één keer afgetrokken en de bestelling gaat naar Onderweg. Controleer de leveringsbon en de voorbereiding vóór u doorgaat.</p><div class="order-modal-actions"><button class="staff-action-secondary" onclick="closeModal()">Annuleren</button><button class="staff-action" onclick="depart()">Bevestig vertrek</button></div></div>')}
function openDeliveryModal(){modal('<div class="order-modal-box"><h2>Ontvangst bevestigen</h2><p>Deze bevestiging is vereist voordat de factuur wordt toegekend.</p><label>Ontvangen door<input id="recipient" type="text" placeholder="Naam ontvanger" autocomplete="name"></label><label>Link naar leveringsbewijs <span style="color:#969696">(optioneel, https://)</span><input id="proof" type="url" placeholder="https://…"></label><div class="order-modal-actions"><button class="staff-action-secondary" onclick="closeModal()">Annuleren</button><button class="staff-action" onclick="deliver()">Bevestigen en factureren</button></div></div>')}
async function update(patch){if(BUSY)return;BUSY=true;try{const r=await fetch("/api/updateorder",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({code:CODE,id:ORDER.id},patch))}),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Bijwerken mislukt.");closeModal();await load();feedback(d.factuurnummer?'Factuurnummer toegekend: '+d.factuurnummer:'Bestelling bijgewerkt.')}catch(error){feedback(error.message||"Netwerkfout.",true)}finally{BUSY=false}}
function depart(){update({statut:"Sortie en livraison"})}function deliver(){const recipient=document.getElementById("recipient").value.trim(),proofUrl=document.getElementById("proof").value.trim();if(!recipient){document.getElementById("recipient").focus();return}if(proofUrl&&!/^https:\/\//i.test(proofUrl)){feedback("Gebruik een https://-link voor het leveringsbewijs.",true);return}update({statut:"Facturée",deliveryConfirmed:true,recipient,proofUrl})}function togglePaid(){update({paiement:ORDER.paiement==="Payé"?"En attente":"Payé"})}
function openDocument(type){const o=ORDER,isFA=type==="FA",lines=parseLines(o.lignes),htva=Number(o.total)/1.06,tva=Number(o.total)-htva,num=isFA?o.factuurnummer:"LB-"+o.ref.replace(/^CMD-/,"");const rows=lines.map(l=>'<tr><td>'+esc(l.name)+(l.comment?'<br><small>'+esc(l.comment)+'</small>':'')+'</td><td class="n">'+esc(l.qty)+'</td><td>'+esc(l.unit)+'</td>'+(isFA?'<td class="n">'+(l.price==null?'—':eur(l.price))+'</td><td class="n">'+(l.price==null?'—':eur(l.price*(Number(String(l.qty).replace(",","."))||0)))+'</td>':'')+'</tr>').join("");const doc='<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;color:#111;margin:0;padding:36px;font-size:12px}h1{margin:0;font-size:20px}.head{display:flex;justify-content:space-between;border-bottom:2px solid #111;padding-bottom:12px}.sub{margin-top:3px;color:#555;line-height:1.45}.parties{display:flex;gap:48px;margin-top:22px}.parties>div{flex:1}h2{font-size:10px;text-transform:uppercase;color:#555}table{width:100%;border-collapse:collapse;margin-top:22px}th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}th{font-size:10px;text-transform:uppercase;background:#f3f3f3}.n{text-align:right}.tot{margin:18px 0 0 auto;width:250px}.tot div{display:flex;justify-content:space-between;padding:4px 0}.tot .grand{border-top:2px solid #111;margin-top:4px;padding-top:8px;font-size:14px;font-weight:bold}.foot{margin-top:28px;border-top:1px solid #ddd;padding-top:8px;font-size:10px;color:#555}</style></head><body><div class="head"><div><h1>Famo Trading BV</h1><div class="sub">Jezusstraat 34<br>2000 Antwerpen, België<br>BTW BE 0788.705.713</div></div><div style="text-align:right"><h1>'+ (isFA?'FACTUUR':'LEVERINGSBON')+'</h1><div class="sub">'+esc(num)+'<br>Bestelling: '+esc(o.ref)+'<br>Datum: '+esc(dateLabel(new Date().toISOString()))+'</div></div></div><div class="parties"><div><h2>Leverancier</h2>Famo Trading BV<br>Jezusstraat 34<br>2000 Antwerpen, België</div><div><h2>Klant</h2>'+esc(o.client)+'<br>'+esc((o.klant||{}).adresse||"").replace(/\n/g,"<br>")+'</div></div><table><tr><th>Beschrijving</th><th class="n">Aantal</th><th>Eenheid</th>'+(isFA?'<th class="n">Tarief</th><th class="n">Subtotaal</th>':'')+'</tr>'+rows+'</table>'+(isFA?'<div class="tot"><div><span>Excl. btw</span><span>'+eur(htva)+'</span></div><div><span>BTW 6,0%</span><span>'+eur(tva)+'</span></div><div class="grand"><span>Totaal</span><span>'+eur(o.total)+'</span></div></div><div class="foot">Betaalstatus: '+esc(o.paiement||"En attente")+'. Bankgegevens nog niet bevestigd. Intern document; Peppol/Billtobox verloopt via de boekhouding.</div>':'<div class="foot">Handtekening klant: ______________________________<br><br>Goederen ontvangen in goede staat en conform.<br>Klachten over verse vis binnen de 12u, over diepvries binnen de 24u.</div>')+'</body></html>';modal('<div class="order-modal-box"><div class="doc-modal-top"><b>'+esc(num)+'</b><span><button class="staff-action-secondary" onclick="closeModal()">Sluiten</button><button class="staff-action" onclick="printDocument()">Afdrukken</button></span></div><iframe id="documentFrame" title="Documentvoorbeeld"></iframe></div>',"order-doc-modal");document.getElementById("documentFrame").srcdoc=doc}
function printDocument(){const f=document.getElementById("documentFrame");if(f&&f.contentWindow)f.contentWindow.print()}function logout(){sessionStorage.removeItem("famoStaffCode");location.href="/bestellingen.html"}document.getElementById("code").addEventListener("keydown",e=>{if(e.key==="Enter")enter()});window.addEventListener("DOMContentLoaded",()=>{const saved=sessionStorage.getItem("famoStaffCode");if(saved){document.getElementById("code").value=saved;enter()}});
</script></body></html>
