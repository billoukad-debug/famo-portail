<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Famo Trading — Bestelling</title><link rel="stylesheet" href="/staff.css"><style>.o-login{min-height:100vh;display:grid;place-items:center;padding:20px}.o-login>div{width:min(100%,390px);padding:28px;border:1px solid #e8e8e8;border-radius:14px;background:#fff}.o-login h1{margin:0 0 5px;font-size:20px}.o-login p{color:#666;font-size:13.5px}.o-login input{width:100%;height:42px;padding:0 12px;margin:5px 0 9px}.o-login button{width:100%;height:42px;border:0;border-radius:9px;background:#111;color:#fff}.o-err{min-height:18px;margin-top:8px;color:#b23b2e;font-size:12px}.o-back{display:inline-block;margin-bottom:22px;color:#666;text-decoration:none;font-size:13px}.o-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}.o-head h1{margin:0;font:500 21px Geist Mono,monospace}.o-head p{margin:5px 0;color:#666;font-size:13.5px}.o-meta{display:flex;gap:18px;flex-wrap:wrap;margin:20px 0;padding:13px 0;border-top:1px solid #eee;border-bottom:1px solid #eee;font-size:12.5px}.o-meta b{display:block;color:#111;margin-bottom:2px}.o-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(280px,.8fr);gap:18px}.o-panel{border:1px solid #e8e8e8;border-radius:12px;background:#fff}.o-panel h2{margin:0;padding:16px 18px 8px;font-size:14.5px}.o-lines{padding:0 18px}.o-line{display:grid;grid-template-columns:1fr auto auto;gap:14px;padding:11px 0;border-top:1px solid #f0f0f0;font-size:13px}.o-line b{font-weight:500}.o-num{font:500 12px Geist Mono,monospace}.o-total{display:flex;justify-content:space-between;margin:5px 18px 0;padding:15px 0;border-top:1px solid #e4e4e4}.o-total b{font:600 18px Geist Mono,monospace}.o-dl{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;padding:4px 18px 18px;font-size:12.5px}.o-dl dt{color:#999}.o-dl dd{margin:0}.o-doc{display:flex;gap:10px;align-items:center;padding:11px 18px;border-top:1px solid #f0f0f0;font-size:12.5px}.o-doc button{margin-left:auto}.o-notice{margin:15px 0;padding:11px 13px;border-radius:9px;background:#f4fbf6;border:1px solid #cfe5d7;color:#22633e;font-size:12.5px}.o-notice.err{background:#fff7f6;border-color:#f0d2ce;color:#b23b2e}.o-sheet{position:fixed;inset:0;z-index:200;display:grid;place-items:center;padding:20px;background:#0005}.o-sheet>div{width:min(100%,440px);padding:22px;border-radius:14px;background:#fff}.o-sheet h2{margin:0;font-size:16px}.o-sheet p{color:#666;font-size:13px}.o-sheet label{display:block;margin-top:12px;font-size:12.5px}.o-sheet input{display:block;width:100%;height:40px;margin-top:5px;padding:0 9px}.o-sheet-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}@media(max-width:800px){.o-grid{grid-template-columns:1fr}}@media(max-width:500px){.o-line{grid-template-columns:1fr auto}.o-line .o-price{grid-column:2}.o-sheet{padding:0}.o-sheet>div{width:100%;border-radius:14px 14px 0 0;align-self:end}}</style></head><body><section id="login" class="o-login"><div><h1>Bestelling openen</h1><p>Meld u aan om de echte bestelling te laden.</p><input id="code" type="password" placeholder="Personeelscode"><button onclick="enter()">Aanmelden</button><div id="err" class="o-err"></div></div></section><div id="app" class="hidden staff-shell"><aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside><nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav><main class="staff-main"><div class="staff-page"><a class="o-back" href="/bestellingen.html">← Alle bestellingen</a><div id="view" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div></div></main></div><div id="sheet" class="hidden"></div><script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ORDER=null,BUSY=false;const id=new URLSearchParams(location.search).get("id")||"";
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}
function eur(n){return "€ "+Number(n||0).toFixed(2).replace(".",",")}
function date(v){if(!v)return"—";const x=new Date(String(v).includes("T")?v:v+"T00:00:00");return Number.isNaN(x)?v:x.toLocaleString("nl-BE",String(v).includes("T")?{dateStyle:"medium",timeStyle:"short"}:{day:"2-digit",month:"2-digit",year:"numeric"})}
function parse(v){return String(v||"").split("\n").filter(Boolean).map(x=>{const m=x.match(/^(.*?)\s*[×x]\s*([\d.,]+)\s*([^\[\(]*)(.*)$/);if(!m)return{name:x,qty:"",unit:"",price:null,comment:""};const p=(m[4]||"").match(/\[€\s*([\d.,]+)\]/),c=(m[4]||"").match(/\((.*?)\)/);return{name:m[1].trim(),qty:m[2],unit:m[3].trim(),price:p?Number(p[1].replace(",",".")):null,comment:c?c[1]:""}})}
async function enter(){
  const input=document.getElementById("code"),err=document.getElementById("err");
  const code=(input.value||"").trim();
  if(!code){err.textContent="Vul de personeelscode in.";return}
  if(enter._busy)return;enter._busy=true;
  err.textContent="Controleren…";
  try{
    await famoStaff.login(code);
    input.value="";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await load();
  }catch(e){err.textContent=famoStaff.translateError(e.message||e)}
  finally{enter._busy=false}
}
async function load(){const v=document.getElementById("view");v.className="staff-loading";v.innerHTML='<div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div>';try{const r=await famoStaff.api("/api/allorders"),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Bestelling kon niet worden geladen.");ORDER=(d.orders||[]).find(o=>o.id===id||o.ref===id);if(!ORDER)throw new Error("Bestelling niet gevonden.");render()}catch(e){v.className="staff-error";v.innerHTML=esc(famoStaff.translateError(e.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>'}}
function render(){const o=ORDER,l=parse(o.lignes),v=document.getElementById("view");v.className="";let action=o.statut==="Reçue"?'<a class="staff-action" href="/entrepot.html">Voorbereiden in magazijn</a>':o.statut==="Prête"?(o.preparationValidee?'<button class="staff-action" onclick="depart()">Vertrek bevestigen</button>':'<a class="staff-action" href="/entrepot.html">Validatie openen</a>'):o.statut==="Sortie en livraison"?'<button class="staff-action" onclick="openDelivery()">Ontvangst bevestigen</button>':'<button class="staff-action-secondary" onclick="paid()">'+(o.paiement==="Payé"?'Markeer openstaand':'Markeer betaald')+'</button>';v.innerHTML='<header class="o-head"><div><h1>'+esc(o.ref)+'</h1><p>'+esc(o.client)+' · <span class="staff-status" style="--status:#235e86">'+esc(famoNL.status(o.statut))+'</span></p></div><div>'+action+' <button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div id="notice"></div><div class="o-meta"><div><b>Leverdatum</b>'+date(o.dateLiv)+'</div><div><b>Betaling</b>'+esc(famoNL.pay(o.paiement||"En attente"))+'</div><div><b>Factuur</b>'+esc(o.factuurnummer||"Nog niet beschikbaar")+'</div><div><b>Bron</b>'+esc((String(o.notes||"").match(/^\[([^\]]+)\]/)||[])[1]||"Klantportaal")+'</div></div><div class="o-grid"><section class="o-panel"><h2>Artikelen</h2><div class="o-lines">'+l.map(x=>'<div class="o-line"><div><b>'+esc(x.name)+'</b>'+(x.comment?'<br><small>'+esc(x.comment)+'</small>':'')+'</div><span class="o-num">'+esc(x.qty)+' '+esc(famoNL.unit(x.unit)||x.unit)+'</span><span class="o-num o-price">'+(x.price==null?'—':eur(x.price))+'</span></div>').join("")+'</div><div class="o-total"><span>Totaal</span><b>'+eur(o.total)+'</b></div></section><aside><section class="o-panel"><h2>Levering</h2><dl class="o-dl"><dt>Voorraad</dt><dd>'+ (o.stockAf?'Afgeboekt bij vertrek':'Nog niet afgeboekt')+'</dd><dt>Ontvangen door</dt><dd>'+esc(o.receptionnePar||"—")+'</dd><dt>Geleverd</dt><dd>'+date(o.livreeLe)+'</dd></dl></section><section class="o-panel" style="margin-top:14px"><h2>Documenten</h2><div class="o-doc"><span>Leveringsbon</span><a class="staff-action-secondary" href="/documenten.html">Open</a></div><div class="o-doc"><span>Factuur</span><a class="staff-action-secondary" href="/documenten.html">Open</a></div></section></aside></div>'}
function notice(m,error){document.getElementById("notice").innerHTML='<div class="o-notice'+(error?' err':'')+'">'+esc(m)+'</div>'}
async function update(p){
  if(BUSY)return;BUSY=true;
  document.querySelectorAll("button").forEach(b=>b.disabled=true);
  try{
    const r=await famoStaff.api("/api/updateorder",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({id:ORDER.id},p))});
    const d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(d.error||"Bijwerken mislukt.");
    closeSheet();await load();notice(d.factuurnummer?'Factuurnummer: '+d.factuurnummer:'Bestelling bijgewerkt.');
  }catch(e){notice(famoStaff.translateError(e.message||"Netwerkfout."),true)}
  finally{BUSY=false;document.querySelectorAll("button").forEach(b=>b.disabled=false)}
}
function depart(){update({statut:"Sortie en livraison"})}
function paid(){update({paiement:ORDER.paiement==="Payé"?"En attente":"Payé"})}
function openDelivery(){document.getElementById("sheet").className="o-sheet";document.getElementById("sheet").innerHTML='<div><h2>Ontvangst bevestigen</h2><p>Een ontvanger is verplicht vóór facturatie.</p><label>Ontvangen door<input id="recipient" placeholder="Naam ontvanger"></label><label>Bewijslink (optioneel)<input id="proof" type="url" placeholder="https://…"></label><div class="o-sheet-actions"><button class="staff-action-secondary" onclick="closeSheet()">Annuleren</button><button class="staff-action" onclick="deliver()">Bevestigen en factureren</button></div></div>'}
function closeSheet(){document.getElementById("sheet").className="hidden";document.getElementById("sheet").innerHTML=""}
function deliver(){const recipient=document.getElementById("recipient").value.trim(),proofUrl=document.getElementById("proof").value.trim();if(!recipient){document.getElementById("recipient").focus();return}if(proofUrl&&!/^https:\/\//i.test(proofUrl)){notice("Gebruik een https://-link voor het bewijs.",true);return}update({statut:"Facturée",deliveryConfirmed:true,recipient,proofUrl})}
async function logout(){await famoStaff.logout();location.href="/bestellingen.html"}
document.getElementById("code").addEventListener("keydown",e=>{if(e.key==="Enter")enter()});
window.addEventListener("DOMContentLoaded",async()=>{
  try{
    if(await famoStaff.check()){
      document.getElementById("login").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      await load();
      return;
    }
  }catch(e){}
});
</script></body></html>
