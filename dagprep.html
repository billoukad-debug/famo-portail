<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Famo Trading — Dagvoorbereiding</title><link rel="stylesheet" href="/staff.css"><style>
.prep-login{min-height:100vh;display:grid;place-items:center;padding:20px}.prep-login>div{width:min(100%,390px);padding:28px;border:1px solid #e8e8e8;border-radius:14px;background:#fff}.prep-login h1{margin:0 0 5px;font-size:20px}.prep-login p{color:#6b6b6b;font-size:13.5px}.prep-login input{width:100%;height:42px;padding:0 12px;margin:5px 0 9px}.prep-login button{width:100%;height:42px;border:0;border-radius:9px;background:#111;color:#fff}.prep-error{min-height:18px;margin-top:8px;color:#b23b2e;font-size:12.5px}.prep-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:23px}.prep-tools label{font-size:12.5px;color:#666}.prep-tools select,.prep-tools input{height:38px}.prep-meta{margin:13px 0;color:#777;font-size:12.5px}.prep-grid{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:20px}.prep-panel{border:1px solid #e8e8e8;border-radius:12px;background:#fff}.prep-panel h2{margin:0;padding:16px 18px 8px;font-size:14.5px}.prep-panel p{margin:0;padding:0 18px 13px;color:#777;font-size:12.5px}.prep-product{display:flex;align-items:center;gap:12px;padding:12px 18px;border-top:1px solid #f0f0f0}.prep-product-qty{margin-left:auto;font:500 17px Geist Mono,ui-monospace,monospace;white-space:nowrap}.prep-product b{display:block;font-size:13.5px;font-weight:500}.prep-product small{display:block;margin-top:2px;color:#888;font-size:11.5px}.prep-order{display:block;padding:12px 18px;border-top:1px solid #f0f0f0;color:#111;text-decoration:none}.prep-order:hover{background:#fafafa}.prep-order-head{display:flex;align-items:center;gap:9px}.prep-order-ref{font:500 12px Geist Mono,ui-monospace,monospace}.prep-order-client{font-size:13px;font-weight:500}.prep-order-lines{margin-top:6px;color:#666;font-size:12px;line-height:1.55}.prep-alert{margin:14px 0;padding:11px 12px;border:1px solid #f0d2ce;border-radius:9px;background:#fff7f6;color:#9c3024;font-size:12.5px}.prep-empty{padding:24px 18px;color:#888;font-size:12.5px}@media(max-width:860px){.prep-grid{grid-template-columns:1fr}.prep-tools input{width:100%}}@media(max-width:520px){.prep-tools>*{width:100%}.prep-tools button{width:100%}}
</style></head><body>
<section id="loginView" class="prep-login"><div><h1>Dagvoorbereiding</h1><p>Consolideer de open bestellingen per leverdatum.</p><input id="code" type="password" placeholder="Personeelscode" autocomplete="current-password"><button onclick="enter()">Aanmelden</button><div id="error" class="prep-error"></div></div></section>
<div id="app" class="hidden staff-shell"><aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside><nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav><main class="staff-main"><div class="staff-page"><header class="staff-page-head"><div><h1>Dagvoorbereiding</h1><p>Geconsolideerde picking vanuit open bestellingen.</p></div><div><button class="staff-action" onclick="printPicklist()">Geconsolideerd afdrukken</button><button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div class="prep-tools"><label for="filter">Leverdatum</label><select id="filter" class="staff-select" onchange="render()"><option value="today">Vandaag</option><option value="tomorrow">Morgen</option><option value="overdue">Te laat</option><option value="nodate">Zonder datum</option><option value="all">Alle open bestellingen</option><option value="custom">Kies datum…</option></select><input id="custom" class="staff-field hidden" type="date" onchange="render()"></div><div id="content" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div></div></main></div>
<script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ORDERS=[],STOCK=[];
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
function key(d){return String(d||"").slice(0,10)}
function today(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Brussels"}).format(new Date())}
function tomorrow(){const d=new Date(today()+"T12:00:00");d.setDate(d.getDate()+1);return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Brussels"}).format(d)}
function dateLabel(v){if(!v)return"Zonder datum";const d=new Date(v+"T00:00:00");return d.toLocaleDateString("nl-BE",{weekday:"long",day:"numeric",month:"long"})}
function parse(txt){return String(txt||"").split("\n").filter(Boolean).map(line=>{const m=line.match(/^(.*?)\s*[×x]\s*([\d.,]+)\s*([^\[\(]*)/);return m?{name:m[1].trim(),qty:Number(m[2].replace(",","."))||0,unit:m[3].trim()}:null}).filter(Boolean)}
function selected(){const f=document.getElementById("filter").value,c=document.getElementById("custom");c.classList.toggle("hidden",f!=="custom");const t=today(),custom=c.value;return ORDERS.filter(o=>{if(o.statut!=="Reçue"&&o.statut!=="Prête")return false;const d=key(o.dateLiv);if(f==="all")return true;if(f==="today")return d===t;if(f==="tomorrow")return d===tomorrow();if(f==="overdue")return!!d&&d<t;if(f==="nodate")return!d;return d===custom})}
async function enter(){
  const input=document.getElementById("code"),e=document.getElementById("error");
  const code=(input.value||"").trim();
  if(!code){e.textContent="Vul de personeelscode in.";return}
  if(enter._busy)return;enter._busy=true;
  e.textContent="Controleren…";
  try{
    await famoStaff.login(code);
    input.value="";
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await load();
  }catch(err){e.textContent=famoStaff.translateError(err.message||err)}
  finally{enter._busy=false}
}
async function load(){const c=document.getElementById("content");c.className="staff-loading";c.innerHTML='<div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div>';try{const [a,b]=await Promise.all([famoStaff.api("/api/allorders"),famoStaff.api("/api/stock")]),ad=await a.json().catch(()=>({})),bd=await b.json().catch(()=>({}));if(!a.ok)throw new Error(ad.error||"Bestellingen konden niet worden geladen.");ORDERS=ad.orders||[];STOCK=b.ok?(bd.items||[]):[];render()}catch(err){c.className="staff-error";c.innerHTML=esc(famoStaff.translateError(err.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>'}}
function render(){const orders=selected(),totals={};orders.forEach(o=>parse(o.lignes).forEach(l=>{const k=(l.name+"|"+l.unit).toLowerCase();if(!totals[k])totals[k]={...l,orders:0};totals[k].qty+=l.qty;totals[k].orders++}));const items=Object.values(totals).sort((a,b)=>a.name.localeCompare(b.name,"nl")),stockBy=new Map(STOCK.map(x=>[String(x.product).toLowerCase(),x]));const alerts=items.map(i=>{const s=stockBy.get(i.name.toLowerCase());return !s?"Onbekend artikel: "+i.name:s.quantity<i.qty?i.name+": "+s.quantity+" beschikbaar, "+i.qty+" nodig":null}).filter(Boolean),c=document.getElementById("content");c.className="";c.innerHTML='<p class="prep-meta">'+orders.length+' bestellingen · '+items.length+' verschillende producten · '+dateLabel(document.getElementById("filter").value==="custom"?document.getElementById("custom").value:document.getElementById("filter").value==="today"?today():"")+'</p>'+(alerts.length?'<div class="prep-alert"><b>Voorraadcontrole vereist</b><br>'+alerts.map(esc).join("<br>")+'</div>':'')+'<div class="prep-grid"><section class="prep-panel"><h2>Geconsolideerde picking</h2><p>Tel per product over de geselecteerde bestellingen. Controleer individuele lijnen in Magazijn vóór vertrek.</p>'+(items.length?items.map(i=>'<div class="prep-product"><div><b>'+esc(i.name)+'</b><small>'+i.orders+' bestelling'+(i.orders===1?'':'en')+' · '+esc(famoNL.unit(i.unit)||i.unit||"eenheid")+'</small></div><span class="prep-product-qty">'+i.qty+' '+esc(famoNL.unit(i.unit)||i.unit)+'</span></div>').join(""):'<div class="prep-empty">Geen open bestellingen voor deze selectie.</div>')+'</section><section class="prep-panel"><h2>Betrokken bestellingen</h2><p>Open een bestelling om de artikelen afzonderlijk te valideren.</p>'+(orders.length?orders.map(o=>'<a class="prep-order" href="/order.html?id='+encodeURIComponent(o.id)+'"><div class="prep-order-head"><span class="prep-order-ref">'+esc(o.ref)+'</span><span class="staff-status" style="--status:'+(o.statut==="Reçue"?"#235e86":"#b4790f")+'">'+esc(famoNL.status(o.statut))+'</span></div><div class="prep-order-client">'+esc(o.client)+'</div><div class="prep-order-lines">'+esc(famoNL.lines(String(o.lignes||"").replace(/\s*\[€[^\]]+\]/g,"").replace(/\n/g," · ")))+'</div></a>').join(""):'<div class="prep-empty">Geen bestellingen gevonden.</div>')+'</section></div>'}
function printPicklist(){const orders=selected(),totals={};orders.forEach(o=>parse(o.lignes).forEach(l=>{const k=(l.name+"|"+l.unit).toLowerCase();if(!totals[k])totals[k]={...l};totals[k].qty+=l.qty}));const items=Object.values(totals);if(!items.length)return;const w=window.open("","_blank");if(!w)return;w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Geconsolideerde picking</title><style>body{font-family:Arial;color:#111;padding:34px}h1{font-size:20px;border-bottom:2px solid #111;padding-bottom:8px}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border-bottom:1px solid #ddd;padding:10px;text-align:left}th{text-transform:uppercase;font-size:10px}.q{text-align:right;font-weight:bold}</style></head><body><h1>Famo Trading — Geconsolideerde picking</h1><p>'+orders.length+' bestellingen · '+new Date().toLocaleString("nl-BE")+'</p><table><tr><th></th><th>Product</th><th class="q">Totaal</th></tr>'+items.map(i=>'<tr><td>☐</td><td>'+esc(i.name)+'</td><td class="q">'+i.qty+' '+esc(famoNL.unit(i.unit)||i.unit)+'</td></tr>').join("")+'</table></body></html>');w.document.close();w.print()}
async function logout(){await famoStaff.logout();location.reload()}
document.getElementById("code").addEventListener("keydown",e=>{if(e.key==="Enter")enter()});
window.addEventListener("DOMContentLoaded",async()=>{
  try{
    if(await famoStaff.check()){
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      await load();
      return;
    }
  }catch(e){}
});
</script></body></html>
