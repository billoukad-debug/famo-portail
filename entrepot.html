<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famo Trading — Magazijn</title>
<link rel="stylesheet" href="/staff.css">
<style>
  .wh-stats{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:14px;color:#666;font-size:12.5px}
  .wh-stats b{font:500 13px Geist Mono,ui-monospace,monospace;color:#111}
  .wh-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:18px}
  .wh-toolbar label{font-size:12px;font-weight:600;color:#777}
  .wh-toolbar input{width:min(300px,100%);min-height:38px;padding:0 12px}
  .wh-toolbar select{min-height:38px;padding:0 10px}
  .wh-toolbar span{margin-left:auto;color:#6b6b6b;font:500 12px Geist Mono,ui-monospace,monospace}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px;padding-bottom:40px}
  @media (max-width:1000px){ .board{grid-template-columns:1fr 1fr} }
  @media (max-width:560px){ .board{grid-template-columns:1fr} }
  .col{background:#f3f3f1;border:1px solid #e5e5e5;border-top:3px solid #235e86;border-radius:10px;padding:10px;min-height:140px}
  .col.c1{border-top-color:#b77800}.col.c2{border-top-color:#287e8f}.col.c3{border-top-color:#28734d}
  .col>h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#555;margin:2px 4px 10px;display:flex;justify-content:space-between;align-items:center}
  .col>h3 .n{background:#272727;color:#fff;border-radius:999px;padding:1px 9px;font-size:11.5px}
  .oc{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:10px}
  .oc .ref{font:650 14px Geist Mono,ui-monospace,monospace;color:#111}
  .oc .cl{font-size:14px;color:#235e86;font-weight:600;margin:2px 0 4px}
  .order-lines{background:#fafafa;border:1px solid #ebebeb;border-radius:6px;padding:5px 10px;margin:6px 0}
  .order-line{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid #eee}
  .order-line:last-child{border-bottom:0}
  .order-line .q{min-width:38px;text-align:right;font:650 18px Geist Mono,ui-monospace,monospace;color:#111}
  .order-line .d{font-size:13.5px;font-weight:600;line-height:1.25;color:#404040}
  .oc .meta{font-size:12px;color:#666;margin-top:6px}
  .oc .row{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .oc button{border:none;border-radius:8px;padding:9px 11px;font-size:12.5px;font-weight:600;min-height:38px;cursor:pointer}
  .adv{background:#111;color:#fff;width:100%;min-height:44px;margin-top:4px}
  .edit{background:#f3f3f1;color:#111;border:1px solid #dedede!important}
  .doc{background:#fff;color:#111;border:1px solid #dedede!important}
  .pay{background:#edf7ef;color:#1e5f3d;border:1px solid #b8ddc0!important}
  .paid{background:#28734d;color:#fff}
  .save{background:#111;color:#fff}
  .oc textarea{width:100%;font-family:inherit;font-size:13px;border:1.5px solid #dedede;border-radius:8px;padding:8px;min-height:76px;margin-top:8px}
  .tin{width:100px;padding:8px;border:1.5px solid #dedede;border-radius:8px;font-size:13px}
  .ehint{font-size:11px;color:#777;margin-top:5px}
  .pick-editor{margin-top:10px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden;background:#fff}
  .pick-row{display:grid;grid-template-columns:28px minmax(0,1fr) 130px;gap:9px;align-items:center;padding:10px;border-bottom:1px solid #e5e5e5}
  .pick-row:last-child{border-bottom:0}.pick-row input[type=checkbox]{width:20px;height:20px;accent-color:#28734d}
  .pick-row .pn{font-size:13px;font-weight:700}.pick-row .pm{font-size:11px;color:#777;margin-top:2px}.pick-row.done{background:#f0fdf4}
  .actual{display:flex;align-items:center;justify-content:flex-end;gap:4px}.actual button{min-width:32px;min-height:32px;padding:0;background:#eef2f6;color:#111;font-size:18px}.actual input{width:48px;min-height:32px;text-align:center;border:1px solid #dedede;border-radius:5px;font:700 14px ui-monospace,monospace}
  .edit-head{font-size:12px;font-weight:700;color:#111;margin-top:10px}.edit-total{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;font-weight:700}.edit-total .tin{width:110px}
  .empty{color:#989898;font-size:12.5px;padding:8px;text-align:center}
  .prep-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:18px}
  .prep-tools label{font-size:12.5px;color:#666}
  .prep-meta{margin:13px 0;color:#777;font-size:12.5px}
  .prep-grid{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:20px}
  .prep-panel{border:1px solid #e8e8e8;border-radius:12px;background:#fff}
  .prep-panel h2{margin:0;padding:16px 18px 8px;font-size:14.5px}
  .prep-panel p{margin:0;padding:0 18px 13px;color:#777;font-size:12.5px}
  .prep-product{display:flex;align-items:center;gap:12px;padding:12px 18px;border-top:1px solid #f0f0f0}
  .prep-product-qty{margin-left:auto;font:500 17px Geist Mono,ui-monospace,monospace;white-space:nowrap}
  .prep-product b{display:block;font-size:13.5px;font-weight:500}
  .prep-product small{display:block;margin-top:2px;color:#888;font-size:11.5px}
  .prep-order{display:block;padding:12px 18px;border-top:1px solid #f0f0f0;color:#111;text-decoration:none}
  .prep-order:hover{background:#fafafa}
  .prep-order-head{display:flex;align-items:center;gap:9px}
  .prep-order-ref{font:500 12px Geist Mono,ui-monospace,monospace}
  .prep-order-client{font-size:13px;font-weight:500}
  .prep-order-lines{margin-top:6px;color:#666;font-size:12px;line-height:1.55}
  .prep-alert{margin:14px 0;padding:11px 12px;border:1px solid #f0d2ce;border-radius:9px;background:#fff7f6;color:#9c3024;font-size:12.5px}
  .prep-empty{padding:24px 18px;color:#888;font-size:12.5px}
  .page-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  @media(max-width:860px){.prep-grid{grid-template-columns:1fr}}
  @media(max-width:620px){.wh-toolbar span{margin-left:0;width:100%}.page-actions{width:100%}.page-actions button{flex:1}}
</style>
</head>
<body>

<section id="loginView" class="staff-login">
  <div>
    <h1>Magazijn</h1>
    <p>Meld u aan voor bereiding, levering en facturatie.</p>
    <input id="code" type="password" placeholder="Personeelscode" autocomplete="current-password">
    <button onclick="enter()">Aanmelden</button>
    <div id="loginError" class="staff-login-error" role="alert"></div>
  </div>
</section>

<div id="app" class="hidden staff-shell">
  <aside data-famo-nav class="staff-sidebar"></aside>
  <nav data-famo-mobile-nav class="staff-mobile-nav"></nav>
  <main class="staff-main"><div class="staff-page">
    <header class="staff-page-head">
      <div>
        <h1>Magazijn</h1>
        <p>Bereiding en levering · <span id="stamp"></span></p>
      </div>
      <div class="page-actions">
        <div class="staff-viewtabs" role="tablist" aria-label="Magazijn weergave">
          <button type="button" id="tabBord" class="active" onclick="setView('bord')">Bord</button>
          <button type="button" id="tabDag" onclick="setView('dag')">Dag</button>
        </div>
        <button class="staff-action-secondary" id="btnPrintBord" onclick="printPicklist()">Voorbereidingslijst</button>
        <button class="staff-action" id="btnPrintDag" onclick="printConsolidatedPicklist()" style="display:none">Geconsolideerd afdrukken</button>
        <button class="staff-action-secondary" onclick="load()">Vernieuwen</button>
      </div>
    </header>
    <div class="wh-stats" aria-label="Dagstatistieken">
      <span>Te bereiden <b id="statTodo">0</b></span>
      <span>Onderweg <b id="statOnway">0</b></span>
      <span>Openstaand <b id="statOpen">0</b></span>
    </div>

    <div id="viewBord">
      <section class="wh-toolbar" aria-label="Bestellingen zoeken en sorteren">
        <label for="orderSearch">Zoeken</label>
        <input id="orderSearch" class="staff-field" type="search" placeholder="Referentie, klant of artikel…" oninput="setOrderQuery(this.value)">
        <label for="orderSort">Sorteren</label>
        <select id="orderSort" class="staff-select" onchange="setOrderSort(this.value)">
          <option value="delivery">Leverdatum: eerst</option>
          <option value="recent">Recent toegevoegd</option>
          <option value="client">Klant: A–Z</option>
          <option value="total">Totaal: hoog naar laag</option>
        </select>
        <button type="button" class="staff-action-secondary" onclick="clearOrderFilters()">Wissen</button>
        <span id="boardSummary" role="status"></span>
      </section>
      <div class="board">
        <div class="col c0"><h3>Ontvangen <span class="n" id="n0">0</span></h3><div id="c0"></div></div>
        <div class="col c1"><h3>Klaar <span class="n" id="n1">0</span></h3><div id="c1"></div></div>
        <div class="col c2"><h3>Onderweg <span class="n" id="n2">0</span></h3><div id="c2"></div></div>
        <div class="col c3"><h3>Gefactureerd <span class="n" id="n3">0</span></h3><div id="c3"></div></div>
      </div>
    </div>

    <div id="viewDag" class="hidden">
      <div class="prep-tools">
        <label for="dayFilter">Leverdatum</label>
        <select id="dayFilter" class="staff-select" onchange="setDayFilter(this.value)">
          <option value="today">Vandaag</option>
          <option value="tomorrow">Morgen</option>
          <option value="overdue">Te laat</option>
          <option value="nodate">Zonder datum</option>
          <option value="all">Alle open bestellingen</option>
          <option value="custom">Kies datum…</option>
        </select>
        <input id="dayCustom" class="staff-field hidden" type="date" onchange="renderDayView()">
      </div>
      <div id="dagContent" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div>
    </div>
  </div></main>
</div>

<div id="docPreview" class="doc-preview hidden" role="dialog" aria-modal="true" aria-labelledby="docPreviewTitle">
  <div class="doc-preview-pane"><div class="doc-preview-actions"><div><strong id="docPreviewTitle">Documentvoorbeeld</strong><span id="docPreviewMeta"></span></div><div><button type="button" onclick="closeDocPreview()">Sluiten</button><button type="button" class="doc-print" onclick="printDocPreview()">Afdrukken</button></div></div><iframe id="docFrame" title="Documentvoorbeeld"></iframe></div>
</div>
<div id="notice" class="notice hidden" role="alert"></div>
<div id="advanceModal" class="doc-preview hidden" role="dialog" aria-modal="true" aria-labelledby="advanceTitle"><div class="doc-preview-pane" style="width:min(460px,100%);height:auto"><div class="doc-preview-actions"><div><strong id="advanceTitle">Status wijzigen</strong></div><button type="button" onclick="closeAdvanceModal()">Sluiten</button></div><div style="padding:20px"><p id="advanceText" style="margin:0;color:#555;line-height:1.5"></p><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px"><button type="button" onclick="closeAdvanceModal()">Annuleren</button><button type="button" class="doc-print" id="advanceConfirm">Bevestigen</button></div></div></div></div>

<script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
/* ====== Bedrijfsgegevens Famo Trading ====== */
const FAMO = {
  nom: "Famo Trading BV",
  adresse: "Jezusstraat 34",
  cp: "2000 Antwerpen, België",
  tva: "BE 0788.705.713",
  tel: "",
  iban: "",
  bic: "",
  tauxTVA: 6
};
/* =========================================== */

const STATUS=["Reçue","Prête","Sortie en livraison","Facturée"];
const NEXTLBL={"Prête":"→ Klaar","Sortie en livraison":"→ Onderweg","Facturée":"→ Gefactureerd"};
const statusColor={"Reçue":"#235e86","Prête":"#b4790f","Sortie en livraison":"#3a8a9c","Facturée":"#2e7d53"};
let ORDERS=[], STOCK=[], DAY_FILTER="today", ORDER_QUERY="", ORDER_SORT="delivery", UPDATING=false, CURRENT_VIEW="bord";
const eur=n=>"€ "+Number(n).toFixed(2).replace(".",",");
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

function renderLines(txt){
  return '<div class="order-lines">'+String(txt||"").split("\n").filter(Boolean).map(line=>{
    const clean=famoNL.lines(line.replace(/\s*\[€[^\]]+\]/g,""));
    const m=clean.match(/^(.*?)\s*[×x]\s*([\d.,]+)\s*(.*)$/);
    if(!m) return '<div class="order-line"><span class="d">'+esc(clean)+'</span></div>';
    return '<div class="order-line"><span class="q">'+esc(m[2])+'</span><span class="d">'+esc(m[3])+' · '+esc(m[1].trim())+'</span></div>';
  }).join("")+'</div>';
}

function setView(view){
  CURRENT_VIEW=view==="dag"?"dag":"bord";
  document.getElementById("viewBord").classList.toggle("hidden", CURRENT_VIEW!=="bord");
  document.getElementById("viewDag").classList.toggle("hidden", CURRENT_VIEW!=="dag");
  document.getElementById("tabBord").classList.toggle("active", CURRENT_VIEW==="bord");
  document.getElementById("tabDag").classList.toggle("active", CURRENT_VIEW==="dag");
  document.getElementById("btnPrintBord").style.display=CURRENT_VIEW==="bord"?"":"none";
  document.getElementById("btnPrintDag").style.display=CURRENT_VIEW==="dag"?"":"none";
  const url=new URL(location.href);
  if(CURRENT_VIEW==="dag") url.searchParams.set("view","dag");
  else url.searchParams.delete("view");
  history.replaceState(null,"",url.pathname+url.search+url.hash);
  if(CURRENT_VIEW==="dag") renderDayView();
}

async function bootWarehouse(){
  await load();
  try{
    const rc=await famoStaff.api("/api/config");
    if(rc.ok){ const cj=await rc.json(); const c=cj.config||{};
      FAMO.nom=c.bedrijfsnaam||FAMO.nom; FAMO.adresse=c.adres||FAMO.adresse;
      FAMO.cp=c.plaats||FAMO.cp; FAMO.tva=c.btw||FAMO.tva;
      FAMO.tel=c.telefoon||FAMO.tel; FAMO.iban=c.iban||""; FAMO.bic=c.bic||""; }
  }catch(e){}
}
const loginCtl=famoStaff.bindLogin({
  code:"code",error:"loginError",loginView:"loginView",appView:"app",
  onDom(){ if(new URLSearchParams(location.search).get("view")==="dag") setView("dag"); },
  onReady:bootWarehouse
});
function enter(){loginCtl.enter()}
async function load(){
  try{
    const [a,b]=await Promise.all([famoStaff.api("/api/allorders"),famoStaff.api("/api/stock")]);
    if(!a.ok) return;
    const d=await a.json(), sd=await b.json().catch(()=>({}));
    ORDERS=d.orders||[];
    STOCK=b.ok?(sd.items||[]):[];
    render();
  }catch(e){}
}

function render(){
  for(let i=0;i<4;i++) document.getElementById("c"+i).innerHTML="";
  const counts=[0,0,0,0];
  const visible=orderView();
  visible.forEach(({o,idx})=>{
    const si=STATUS.indexOf(o.statut); if(si<0) return; counts[si]++;
    const next=si<3?STATUS[si+1]:null;
    const paid=o.paiement==="Payé";
    const el=document.createElement("div"); el.className="oc";
    el.innerHTML='<div class="ref">'+esc(o.ref)+'</div>'+
      '<div class="cl">'+esc(o.client)+'</div>'+
      renderLines(o.lignes)+
      '<div class="meta">Levering: '+esc(o.dateLiv||"—")+' · Totaal: <b>'+eur(o.total)+'</b></div>'+
      (o.factuurnummer?'<div class="meta">'+esc(o.factuurnummer)+'</div>':'')+
      (o.stockAf?'<div class="meta" style="color:#28734d">✓ Voorraad afgeboekt</div>':'')+
      (o.statut==="Prête"&&!o.preparationValidee?'<div class="meta" style="color:#9a6700">Artikels nog niet afzonderlijk gevalideerd</div>':'')+
      (o.livraisonConfirmee?'<div class="meta" style="color:#28734d">✓ Ontvangen door '+esc(o.receptionnePar||"klant")+(o.preuveLivraison&&o.preuveLivraison.length?' · <a href="'+esc(o.preuveLivraison[0].url)+'" target="_blank" rel="noopener">bewijs</a>':'')+'</div>':'')+
      (o.notes?'<div class="meta">'+esc(o.notes)+'</div>':'')+
      '<div class="row">'+
        ((o.statut==="Reçue"||(o.statut==="Prête"&&!o.preparationValidee))?'<button class="adv" onclick="editLines('+idx+')">Artikels valideren</button>':(next?((next==="Facturée"?'<a class="adv" href="/order.html?id='+encodeURIComponent(o.id)+'" style="display:block;text-align:center;text-decoration:none">Ontvangst bevestigen</a>':'<button class="adv" onclick="confirmAdvance(\''+o.id+'\',\''+next+'\','+idx+')">'+(NEXTLBL[next]||('→ '+famoNL.status(next)))+'</button>')):''))+
        (o.statut!=="Reçue"?'<button class="edit" onclick="editLines('+idx+')">Aantallen</button>':'')+
        '<button class="doc" onclick="doc('+idx+',\'BL\')">Leverbon</button>'+
        '<button class="doc" onclick="doc('+idx+',\'FA\')">Factuur</button>'+
        '<button class="'+(paid?"paid":"pay")+'" onclick="togglePay(\''+o.id+'\',\''+(paid?"En attente":"Payé")+'\')">'+(paid?"Betaald":"Markeer betaald")+'</button>'+
      '</div><div id="e'+idx+'"></div>';
    document.getElementById("c"+si).appendChild(el);
  });
  for(let i=0;i<4;i++){ document.getElementById("n"+i).textContent=counts[i]; if(!counts[i]) document.getElementById("c"+i).innerHTML='<div class="empty">—</div>'; }
  document.getElementById("statTodo").textContent=counts[0]+counts[1]; document.getElementById("statOnway").textContent=counts[2]; document.getElementById("statOpen").textContent=counts[0]+counts[1]+counts[2];
  const summary=document.getElementById("boardSummary"); if(summary) summary.textContent=visible.length+" van "+ORDERS.length+" bestellingen";
  document.getElementById("stamp").textContent="Bijgewerkt: "+new Date().toLocaleTimeString("nl-BE");
  if(CURRENT_VIEW==="dag") renderDayView();
}

function orderView(){
  const q=ORDER_QUERY.trim().toLocaleLowerCase("nl-BE");
  const rows=ORDERS.map((o,idx)=>({o,idx})).filter(({o})=>!q||[o.ref,o.client,o.lignes,o.notes].join(" ").toLocaleLowerCase("nl-BE").includes(q));
  const delivery=o=>String(o.dateLiv||"9999-12-31"), recent=o=>String(o.date||"");
  return rows.sort((a,b)=>{
    if(ORDER_SORT==="client") return String(a.o.client).localeCompare(String(b.o.client),"nl");
    if(ORDER_SORT==="total") return Number(b.o.total||0)-Number(a.o.total||0);
    if(ORDER_SORT==="recent") return recent(b.o).localeCompare(recent(a.o));
    return delivery(a.o).localeCompare(delivery(b.o));
  });
}
function setOrderQuery(value){ORDER_QUERY=value;render()}
function setOrderSort(value){ORDER_SORT=value;render()}
function clearOrderFilters(){ORDER_QUERY="";ORDER_SORT="delivery";document.getElementById("orderSearch").value="";document.getElementById("orderSort").value="delivery";render()}

function dayKey(offset=0){
  const base=new Date(new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Brussels"}).format(new Date())+"T12:00:00");
  base.setDate(base.getDate()+offset);
  return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Brussels"}).format(base);
}
function dateLabel(v){if(!v)return"Zonder datum";const d=new Date(v+"T00:00:00");return d.toLocaleDateString("nl-BE",{weekday:"long",day:"numeric",month:"long"})}
function setDayFilter(value){DAY_FILTER=value;document.getElementById("dayCustom").classList.toggle("hidden",value!=="custom");if(value==="custom"&&!document.getElementById("dayCustom").value)document.getElementById("dayCustom").value=dayKey();renderDayView()}
function preparationOrders(){
  const today=dayKey(),custom=document.getElementById("dayCustom"),selected=custom?custom.value:"";
  return ORDERS.filter(o=>{
    if(o.statut!=="Reçue"&&o.statut!=="Prête")return false;
    const date=String(o.dateLiv||"").slice(0,10);
    if(DAY_FILTER==="all")return true;
    if(DAY_FILTER==="today")return date===today;
    if(DAY_FILTER==="tomorrow")return date===dayKey(1);
    if(DAY_FILTER==="overdue")return !!date&&date<today;
    if(DAY_FILTER==="nodate")return !date;
    if(DAY_FILTER==="custom")return date===selected;
    return false;
  });
}
function parsePrepLine(txt){
  return String(txt||"").split("\n").filter(Boolean).map(line=>{
    const m=line.match(/^(.*?)\s*[×x]\s*([\d.,]+)\s*([^\[\(]*)/);
    return m?{name:m[1].trim(),qty:Number(m[2].replace(",","."))||0,unit:m[3].trim()}:null;
  }).filter(Boolean);
}
function consolidatedItems(){
  const totals={};
  preparationOrders().forEach(o=>parsePrepLine(o.lignes).forEach(line=>{
    const key=(line.name+"|"+line.unit).toLowerCase();
    if(!totals[key]) totals[key]={name:line.name,unit:line.unit,quantity:0,orders:0};
    totals[key].quantity+=line.qty; totals[key].orders++;
  }));
  return Object.values(totals).sort((a,b)=>a.name.localeCompare(b.name,"nl"));
}
function renderDayView(){
  const orders=preparationOrders(),items=consolidatedItems();
  const stockBy=new Map(STOCK.map(x=>[String(x.product).toLowerCase(),x]));
  const alerts=items.map(i=>{
    const s=stockBy.get(i.name.toLowerCase());
    return !s?"Onbekend artikel: "+i.name:s.quantity<i.quantity?i.name+": "+s.quantity+" beschikbaar, "+i.quantity+" nodig":null;
  }).filter(Boolean);
  const label=DAY_FILTER==="custom"?document.getElementById("dayCustom").value:DAY_FILTER==="today"?dayKey():DAY_FILTER==="tomorrow"?dayKey(1):"";
  const c=document.getElementById("dagContent");
  c.className="";
  c.innerHTML='<p class="prep-meta">'+orders.length+' bestellingen · '+items.length+' verschillende producten'+(label?' · '+dateLabel(label):'')+'</p>'+
    (alerts.length?'<div class="prep-alert"><b>Voorraadcontrole vereist</b><br>'+alerts.map(esc).join("<br>")+'</div>':'')+
    '<div class="prep-grid"><section class="prep-panel"><h2>Geconsolideerde picking</h2><p>Tel per product over de geselecteerde bestellingen. Controleer individuele lijnen in Magazijn vóór vertrek.</p>'+
    (items.length?items.map(i=>'<div class="prep-product"><div><b>'+esc(i.name)+'</b><small>'+i.orders+' bestelling'+(i.orders===1?'':'en')+' · '+esc(famoNL.unit(i.unit)||i.unit||"eenheid")+'</small></div><span class="prep-product-qty">'+i.quantity+' '+esc(famoNL.unit(i.unit)||i.unit)+'</span></div>').join(""):'<div class="prep-empty">Geen open bestellingen voor deze selectie.</div>')+
    '</section><section class="prep-panel"><h2>Betrokken bestellingen</h2><p>Open een bestelling om de artikelen afzonderlijk te valideren.</p>'+
    (orders.length?orders.map(o=>'<a class="prep-order" href="/order.html?id='+encodeURIComponent(o.id)+'"><div class="prep-order-head"><span class="prep-order-ref">'+esc(o.ref)+'</span><span class="staff-status" style="--status:'+(statusColor[o.statut]||"#8d8d8d")+'">'+esc(famoNL.status(o.statut))+'</span></div><div class="prep-order-client">'+esc(o.client)+'</div><div class="prep-order-lines">'+esc(famoNL.lines(String(o.lignes||"").replace(/\s*\[€[^\]]+\]/g,"").replace(/\n/g," · ")))+'</div></a>').join(""):'<div class="prep-empty">Geen bestellingen gevonden.</div>')+
    '</section></div>';
}

function parseOrderLine(line){
  const raw=String(line||"").trim();
  const m=raw.match(/^(.*?)\s*[×x]\s*([\d.,]+)\s*([^\[\(]*)(.*)$/);
  if(!m) return {raw,name:raw,quantity:0,unit:"",price:null,comment:""};
  const tail=m[4]||"", price=tail.match(/\[€\s*([\d.,]+)\]/), comment=tail.match(/\((.*?)\)/);
  return {raw,name:m[1].trim(),quantity:parseFloat(m[2].replace(",","."))||0,unit:m[3].trim(),price:price?parseFloat(price[1].replace(",",".")):null,comment:comment?comment[1]:""};
}
function formatOrderLine(line, quantity){
  const q=Math.max(0,Math.round((Number(quantity)||0)*1000)/1000);
  return line.name+" × "+q+(line.unit?" "+line.unit:"")+(line.price==null?"":" [€"+line.price.toFixed(2)+"]")+(line.comment?" ("+line.comment+")":"");
}
function changeActual(orderIndex,lineIndex,delta){
  const input=document.getElementById("aq"+orderIndex+"_"+lineIndex); if(!input) return;
  const line=((window._editingLines||{})[orderIndex]||[])[lineIndex]||{},step=/kg/i.test(String(line.unit||""))?.1:1;
  input.value=Math.max(0,Math.round(((parseFloat(input.value)||0)+delta*step)*1000)/1000); refreshActualTotal(orderIndex);
}
function refreshActualTotal(orderIndex){
  const lines=(window._editingLines||{})[orderIndex]||[];
  const totalInput=document.getElementById("tt"+orderIndex); if(!totalInput) return;
  if(lines.every(line=>line.price!=null)){
    const total=lines.reduce((sum,line,i)=>sum+(parseFloat(document.getElementById("aq"+orderIndex+"_"+i).value)||0)*line.price,0);
    totalInput.value=(Math.round(total*100)/100).toFixed(2); totalInput.readOnly=true;
  }
}
function markPicked(orderIndex,lineIndex){
  const check=document.getElementById("ok"+orderIndex+"_"+lineIndex), row=document.getElementById("pr"+orderIndex+"_"+lineIndex);
  if(row) row.classList.toggle("done",!!check.checked);
}
function editLines(idx){
  const o=ORDERS[idx], box=document.getElementById("e"+idx);
  if(box.innerHTML){ box.innerHTML=""; return; }
  const lines=String(o.lignes||"").split("\n").filter(Boolean).map(parseOrderLine);
  window._editingLines=window._editingLines||{}; window._editingLines[idx]=lines;
  const allPriced=lines.every(line=>line.price!=null);
  box.innerHTML='<div class="edit-head">Controleer en valideer elk artikel voordat de bestelling vertrekt.</div>'+
    '<div class="pick-editor">'+lines.map((line,i)=>
      '<label class="pick-row" id="pr'+idx+'_'+i+'">'+
      '<input id="ok'+idx+'_'+i+'" type="checkbox" onchange="markPicked('+idx+','+i+')" aria-label="Artikel gecontroleerd">'+
      '<span><span class="pn">'+esc(line.name)+'</span><span class="pm">Besteld: '+line.quantity+(line.unit?' '+esc(famoNL.unit(line.unit)||line.unit):'')+(line.comment?' · '+esc(line.comment):'')+'</span></span>'+
      '<span class="actual"><button type="button" onclick="changeActual('+idx+','+i+',-1)">−</button><input id="aq'+idx+'_'+i+'" type="number" min="0" step="'+(/kg/i.test(String(line.unit||""))?"0.1":"1")+'" value="'+line.quantity+'" oninput="refreshActualTotal('+idx+')"><button type="button" onclick="changeActual('+idx+','+i+',1)">+</button></span>'+
      '</label>').join('')+'</div>'+
    '<div class="edit-total">Werkelijk totaal: <input class="tin" id="tt'+idx+'" type="number" step="0.01" value="'+o.total+'" '+(allPriced?'readonly':'')+'><button class="save" onclick="saveLines('+idx+')">'+(o.statut==="Reçue"?'✓ Klaarzetten':'✓ Voorbereiding opslaan')+'</button></div>'+
    '<div class="ehint">Deeltijdige levering: pas de aantallen hieronder aan vóór vertrek (Sortie). Statussen en Airtable-kolommen blijven ongewijzigd — alleen de voorbereide hoeveelheden tellen.</div>'+
    '<div class="ehint">De aantallen en het totaal worden vastgezet zodra de goederen vertrekken.</div>';
  refreshActualTotal(idx);
}
async function saveLines(idx){
  const o=ORDERS[idx];
  const lines=(window._editingLines||{})[idx]||[];
  if(!lines.length){ showNotice("Geen artikels gevonden.","error"); return; }
  const unchecked=lines.findIndex((_,i)=>!document.getElementById("ok"+idx+"_"+i).checked);
  if(unchecked>=0){ showNotice("Valideer elk artikel afzonderlijk voordat u opslaat.","error"); return; }
  const actualLines=lines.map((line,i)=>formatOrderLine(line,document.getElementById("aq"+idx+"_"+i).value));
  const patch={id:o.id, lignes:actualLines.join("\n"), total:parseFloat(document.getElementById("tt"+idx).value)||0, preparationValidee:true};
  if(o.statut==="Reçue") patch.statut="Prête";
  await upd(patch);
}

    'h1{color:#111;font-size:22px;margin-bottom:6px}h2{font-size:17px;margin:0 0 6px}'+
    '.parties{display:flex;gap:40px;margin-top:20px}.parties>div{flex:1}'+
    '.lbl{font-weight:bold;color:#111;margin-bottom:5px;font-size:13px}'+
    'table.it{width:100%;border-collapse:collapse;margin-top:22px}'+
    'table.it th{background:#f5f5f5;border-bottom:2px solid #ddd;padding:8px;text-align:left;font-size:11.5px;color:#111}'+
    'table.it td{border-bottom:1px solid #e2e8f0;padding:8px}'+
    '.num{text-align:right}'+
    '.tot{margin-top:18px;margin-left:auto;width:290px}'+
    '.tot div{display:flex;justify-content:space-between;padding:5px 0}'+
    '.tot .g{border-top:2px solid #111;margin-top:5px;padding-top:8px;font-size:16px;font-weight:bold;color:#111}'+
    '.bank{margin-top:26px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:12px;font-size:11.5px}'+
    '.ft{margin-top:20px;font-size:10.5px;color:#64748b;border-top:1px solid #e2e8f0;padding-top:8px;line-height:1.55}'+
    '.sig{margin-top:34px;font-size:12px}'+
    '</style></head><body>'+

    '<div class="hd"><div><h1>'+esc(FAMO.nom)+'</h1><div>'+esc(FAMO.adresse)+'<br>'+esc(FAMO.cp)+
      '<br>BTW: '+esc(FAMO.tva)+(FAMO.tel?'<br>'+esc(FAMO.tel):'')+'</div></div>'+
    '<div style="text-align:right"><h2>'+titre+'</h2>'+
      '<div><b>'+(isFA?'Factuur':'Leverbon')+':</b> '+esc(num)+
      '<br><b>Bestelbonnummer:</b> '+esc(o.ref)+
      '<br><b>Documentdatum:</b> '+fdate(d)+
      (isFA?'<br><b>Vervaldatum:</b> '+fdate(verval):'')+
      (o.dateLiv?'<br><b>Leverdatum:</b> '+esc(o.dateLiv):'')+'</div></div></div>'+

    '<div class="parties"><div><div class="lbl">Leverancier</div>'+esc(FAMO.nom)+'<br>'+esc(FAMO.adresse)+'<br>'+esc(FAMO.cp)+'<br>BTW: '+esc(FAMO.tva)+'</div>'+
    '<div><div class="lbl">Klant</div>'+esc(k.nom)+
      (k.adresse?'<br>'+esc(k.adresse).replace(/\n/g,"<br>"):'')+

function showDocPreview(html,num){const modal=document.getElementById("docPreview"),frame=document.getElementById("docFrame");document.getElementById("docPreviewMeta").textContent=num;frame.srcdoc=html;modal.classList.remove("hidden");document.body.style.overflow="hidden";modal.querySelector("button").focus()}
function closeDocPreview(){const modal=document.getElementById("docPreview");modal.classList.add("hidden");document.getElementById("docFrame").srcdoc="";document.body.style.overflow=""}
function printDocPreview(){const frame=document.getElementById("docFrame");if(frame.contentWindow)frame.contentWindow.print()}
function showNotice(message,kind="info"){const box=document.getElementById("notice");box.textContent=message;box.className="notice "+kind;clearTimeout(window._noticeTimer);window._noticeTimer=setTimeout(()=>box.classList.add("hidden"),7000)}
async function logoutWarehouse(){await loginCtl.logout()}

async function adv(id,statut){ await upd({id,statut}); }
function confirmAdvance(id,statut,index){
  const ref=ORDERS[index]?ORDERS[index].ref:"";
  let message="Bestelling "+ref+" naar ‘"+famoNL.status(statut)+"’ verplaatsen?";
  if(statut==="Sortie en livraison") message+=" De definitieve hoeveelheden worden vastgezet en de voorraad wordt één keer afgeboekt. Controleer voorbereiding en leverbon eerst.";
  if(statut==="Facturée") message+=" Er wordt een definitief factuurnummer toegekend.";
  document.getElementById("advanceText").textContent=message;
  document.getElementById("advanceConfirm").onclick=async()=>{closeAdvanceModal();await adv(id,statut)};
  document.getElementById("advanceModal").classList.remove("hidden");
}
function closeAdvanceModal(){document.getElementById("advanceModal").classList.add("hidden")}
async function togglePay(id,paiement){ await upd({id,paiement}); }
async function upd(patch){
  if(UPDATING)return;
  UPDATING=true;document.querySelectorAll("button").forEach(b=>b.disabled=true);
  try{
    const r=await famoStaff.api("/api/updateorder",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(patch)});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){
      const missing=d.stock&&d.stock.missing&&d.stock.missing.length?"\n\nNiet gevonden in voorraad:\n- "+d.stock.missing.join("\n- "):"";
      const insufficient=d.stock&&d.stock.insufficient&&d.stock.insufficient.length?"\n\nOnvoldoende voorraad:\n"+d.stock.insufficient.map(x=>"- "+x.nom+": "+x.available+" beschikbaar, "+x.requested+" gevraagd").join("\n"):"";
      showNotice(famoStaff.translateError(d.error||"Fout bij bijwerken")+missing+insufficient,"error");return;
    }
    if(d.stock){
      const done=(d.stock.done||[]).map(x=>x.nom+": "+x.van+" → "+x.naar).join("\n"),miss=(d.stock.missing||[]);let msg="";
      if(done) msg+="Voorraad afgeboekt:\n"+done;
      if(miss.length) msg+=(msg?"\n\n":"")+"⚠️ Niet gevonden in voorraad (niets afgeboekt):\n- "+miss.join("\n- ")+"\n\nControleer de productnamen in Airtable.";
      if(msg) showNotice(msg,"info");
    }
    if(d.factuurnummer) showNotice("Factuurnummer toegekend: "+d.factuurnummer,"info");
    await load();
  }catch(error){showNotice(famoStaff.translateError(error.message||"Verbinding mislukt. Probeer opnieuw."),"error");}
  finally{UPDATING=false;document.querySelectorAll("button").forEach(b=>b.disabled=false)}
}
