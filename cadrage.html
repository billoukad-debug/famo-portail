<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAMO Seafood — Vragenlijst</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#eef2f5; color:#1a2b3c; padding:16px; }
  .wrap { max-width:720px; margin:0 auto; }
  .hero { background:#0b3d5c; color:#fff; border-radius:14px; padding:24px; margin-bottom:16px; }
  .hero h1 { font-size:21px; }
  .hero p { font-size:14px; opacity:.92; margin-top:8px; line-height:1.5; }
  .sec { background:#fff; border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .sec h2 { font-size:15px; color:#0b3d5c; border-bottom:2px solid #eef1f4; padding-bottom:8px; margin-bottom:14px; }
  .q { margin-bottom:20px; }
  .q .lab { font-weight:600; font-size:14px; margin-bottom:3px; }
  .q .hint { font-size:12px; color:#7b8794; margin-bottom:8px; line-height:1.45; }
  .opt { display:block; padding:9px 11px; border:1px solid #dbe3ea; border-radius:9px; margin-bottom:6px; cursor:pointer; font-size:14px; background:#fbfcfd; }
  .opt:hover { background:#f2f7fa; }
  .opt input { margin-right:9px; }
  .opt.sel { border-color:#1565c0; background:#e9f2fb; }
  input[type=text], textarea { width:100%; border:1px solid #cdd6df; border-radius:8px; padding:10px; font-size:14px; font-family:inherit; }
  textarea { min-height:60px; resize:vertical; }
  .extra { margin-top:7px; }
  .key { color:#c62828; font-size:11px; font-weight:700; margin-left:6px; }
  .btn { width:100%; background:#1565c0; color:#fff; border:none; padding:16px; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
  .btn:disabled { background:#b7c4d1; }
  .done { background:#e8f5e9; border:1px solid #a5d6a7; color:#2e7d32; padding:22px; border-radius:12px; text-align:center; font-size:15px; display:none; }
  .msg { font-size:13px; color:#c62828; text-align:center; margin-top:10px; min-height:18px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <h1>🐟 FAMO Seafood — Vragenlijst</h1>
    <p>Deze antwoorden gebruiken we om uw systeem te bouwen (bestellingen, magazijn, voorraad, facturatie).
    Vink gewoon aan wat past. Weet u het nog niet? Kies dan « Nog niet beslist ».
    Vragen met <span class="key">BELANGRIJK</span> bepalen het meest.</p>
  </div>

  <div id="form"></div>
  <button class="btn" id="send" onclick="send()">Antwoorden versturen</button>
  <div class="msg" id="msg"></div>
  <div class="done" id="done">✅ <strong>Bedankt!</strong><br>Uw antwoorden zijn goed ontvangen.</div>
</div>

<script>
const NIET = "Nog niet beslist / weet ik niet";
const Q = [
 {sec:"Over u"},
 {id:"repondant", lab:"Uw naam", type:"text"},
 {id:"entreprise", lab:"Bedrijf", type:"text"},
 {id:"email", lab:"E-mail", type:"text"},

 {sec:"A. Bedrijfsgegevens en facturatie"},
 {id:"q1", lab:"1. Officiële bedrijfsgegevens", key:1, type:"fields",
  fields:["Officiële naam + rechtsvorm (bv. FAMO BV)","Adres maatschappelijke zetel","Adres magazijn (indien anders)","BTW-nummer","IBAN","Telefoon"]},
 {id:"q2", lab:"2. Welk BTW-tarief?", key:1, hint:"Laat dit bevestigen door uw boekhouder.",
  opts:["Alles aan 6%","Alles aan 21%","Gemengd (verschillende tarieven)",NIET]},
 {id:"q2b", lab:"2b. Bijzondere gevallen?", multi:1,
  opts:["Klanten in het buitenland","Verlegging van heffing (autoliquidatie)","Levering apart gefactureerd","Particulieren én bedrijven","Geen bijzondere gevallen"]},
 {id:"q3", lab:"3. Factuurnummering",
  opts:["Automatisch door het systeem (bv. 2026-0001)","Ik geef zelf het startnummer door","Blijft in mijn boekhoudprogramma",NIET],
  extra:"Huidig formaat / laatste nummer (optioneel)"},
 {id:"q4", lab:"4. Peppol e-facturatie", key:1, hint:"Verplicht voor B2B in België sinds 01/01/2026.",
  opts:["Ja, ik heb al een Peppol-provider","Mijn boekhoudprogramma doet het","Nee, nog niets geregeld","Ik weet niet wat Peppol is"],
  extra:"Naam boekhouder + boekhoudprogramma (Yuki, Exact, Winbooks, Odoo…)"},
 {id:"q5", lab:"5. Betaaltermijn klanten",
  opts:["Contant / bij levering","7 dagen","14 dagen","30 dagen","Verschilt per klant",NIET]},

 {sec:"B. Klanten"},
 {id:"q6", lab:"6. Hoeveel klanten nu?",
  opts:["1 tot 5","6 tot 20","21 tot 50","Meer dan 50"]},
 {id:"q6b", lab:"6b. Welke types klanten?", multi:1,
  opts:["Restaurants / horeca","Viswinkels","Groothandel","Particulieren","Grootkeukens / catering"]},
 {id:"q7", lab:"7. Hoe werken de prijzen per klant?", key:1,
  opts:["Vaste prijs per product per klant","Kortingspercentage per klant","Zelfde prijs voor iedereen","Prijs verandert elke dag (aanvoer)",NIET]},
 {id:"q7b", lab:"7b. Wie past de prijzen aan?",
  opts:["Ikzelf","Een medewerker","Automatisch uit een bestand",NIET]},
 {id:"q8", lab:"8. Wat moeten we per klant bijhouden?", multi:1,
  opts:["Meerdere leveradressen","Meerdere contactpersonen","Vaste levermomenten / uren","Kredietlimiet","Interne notities (niet zichtbaar voor klant)"]},
 {id:"q9", lab:"9. Wie logt in bij de klant?",
  opts:["Eén login per bedrijf","Meerdere personen per bedrijf","Meerdere personen met verschillende rechten",NIET]},
 {id:"q10", lab:"10. Bestellingen buiten de website?",
  opts:["Ja, veel klanten bellen of appen","Ja, maar weinig","Nee, iedereen bestelt online"]},
 {id:"q10b", lab:"10b. Wie voert die bestellingen dan in?",
  opts:["Ikzelf","Een medewerker op kantoor","Iemand in het magazijn","Niet van toepassing"]},

 {sec:"C. Producten en voorraad"},
 {id:"q11", lab:"11. Hoeveel producten in de catalogus?",
  opts:["Minder dan 25","25 tot 100","100 tot 300","Meer dan 300"]},
 {id:"q11b", lab:"11b. Wat moet erbij staan?", multi:1,
  opts:["Foto's","Herkomst / vangstgebied","Kaliber / maat","Labels (bio, MSC…)","Allergenen","Alleen naam en prijs volstaat"]},
 {id:"q12", lab:"12. Producten met variabel gewicht", key:1, hint:"Klant bestelt 3 zalmen, u levert 8,4 kg.",
  opts:["Klant bestelt per stuk, wij factureren op werkelijk gewicht","Klant bestelt in kg, wij leveren zo dicht mogelijk","Beide, hangt van het product af","Niet van toepassing"]},
 {id:"q12b", lab:"12b. Wanneer kent u het echte gewicht?",
  opts:["Bij het klaarmaken (weging in magazijn)","Bij de levering","Pas bij de facturatie",NIET]},
 {id:"q12c", lab:"12c. Moet de klant het verschil goedkeuren?",
  opts:["Nee, wij factureren gewoon het werkelijke gewicht","Alleen bij een groot verschil","Ja, altijd bevestigen",NIET]},
 {id:"q13", lab:"13. Voorraadbeheer", key:1,
  opts:["Ja, voorraad automatisch afboeken bij levering","Ja, maar enkel manueel bijhouden","Nee, geen voorraadbeheer nodig",NIET]},
 {id:"q13b", lab:"13b. Wat moet u kunnen aantonen?", multi:1,
  opts:["Lotnummers / traceerbaarheid (FAVV)","Houdbaarheidsdata","Inkomende leveringen van leveranciers","Verlies / afval","Niets bijzonders"]},
 {id:"q14", lab:"14. Product niet op voorraad — wat dan?",
  opts:["Vervangproduct voorstellen","Gedeeltelijk leveren","Klant opbellen","Bestelling blokkeren",NIET]},
 {id:"q15", lab:"15. Hoe vaak worden prijzen/catalogus aangepast?",
  opts:["Elke dag","Enkele keren per week","Wekelijks","Zelden"]},

 {sec:"D. Bestellingen, magazijn en levering"},
 {id:"q16", lab:"16. Uiterste tijd om te bestellen?", key:1,
  opts:["De dag ervoor vóór 17u","De dag ervoor 's avonds","Dezelfde dag 's ochtends vroeg","Geen vaste limiet",NIET],
  extra:"Exact uur indien anders"},
 {id:"q16b", lab:"16b. Op welke dagen levert u?", multi:1,
  opts:["Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag","Zondag"]},
 {id:"q17", lab:"17. Hoeveel mensen werken in het magazijn?",
  opts:["1 persoon","2 tot 3","4 tot 6","Meer dan 6"]},
 {id:"q17b", lab:"17b. Waarmee werken ze?",
  opts:["Smartphone","Tablet","Computer","Papier (afgedrukte lijst)"], multi:1},
 {id:"q17c", lab:"17c. Nodig in het magazijn?", multi:1,
  opts:["Picklijst afdrukken","Foto van de klaargemaakte bestelling","Barcodes scannen","Gewicht ingeven per lijn","Niets van dit alles"]},
 {id:"q18", lab:"18. Wie levert?",
  opts:["Eigen chauffeurs","Externe transporteur","Beide","Klant komt afhalen"]},
 {id:"q18b", lab:"18b. Bewijs van levering nodig?", multi:1,
  opts:["Handtekening van de klant","Foto bij levering","Alleen leveringsbon op papier","Niet nodig"]},
 {id:"q18c", lab:"18c. Moet de klant verwittigd worden?",
  opts:["Ja, per e-mail bij vertrek","Ja, per SMS/WhatsApp","Nee, niet nodig",NIET]},
 {id:"q19", lab:"19. Bij een klacht of fout — wat gebeurt er?",
  opts:["Creditnota maken","Korting op volgende factuur","Product opnieuw leveren","Geval per geval bekeken",NIET]},

 {sec:"E. Prioriteiten"},
 {id:"q20", lab:"20. Wat moet er binnen 3 maanden zeker werken?", key:1, multi:1,
  opts:["Online bestellen door klanten","Magazijn / voorbereiding","Voorraadbeheer","Wettelijke facturatie (Peppol)","Koppeling met boekhouding","Publieke website / vitrine","Mobiele app","Statistieken en rapporten"]},
 {id:"q20b", lab:"20b. Maandelijks budget voor software en hosting?",
  opts:["Minder dan 50 €","50 tot 150 €","150 tot 400 €","Meer dan 400 €",NIET]},
 {id:"q20c", lab:"20c. Wie wordt verantwoordelijk voor het systeem?",
  opts:["Ikzelf","Een medewerker","Nog te bepalen"]},
 {id:"bonus", lab:"Nog iets belangrijk dat we moeten weten?", type:"textarea", hint:"Optioneel — talen (NL/FR/EN), logo, domeinnaam, huidig softwarepakket…"}
];

function build(){
  let h="", open=false;
  Q.forEach(item=>{
    if(item.sec){ if(open) h+="</div>"; h+='<div class="sec"><h2>'+item.sec+'</h2>'; open=true; return; }
    h+='<div class="q"><div class="lab">'+item.lab+(item.key?'<span class="key">BELANGRIJK</span>':'')+'</div>';
    if(item.hint) h+='<div class="hint">'+item.hint+'</div>';
    if(item.type==="text"){ h+='<input type="text" id="'+item.id+'">'; }
    else if(item.type==="textarea"){ h+='<textarea id="'+item.id+'"></textarea>'; }
    else if(item.type==="fields"){
      item.fields.forEach((f,n)=>{ h+='<div class="extra"><input type="text" id="'+item.id+'_'+n+'" placeholder="'+f+'"></div>'; });
    }
    else {
      const t=item.multi?"checkbox":"radio";
      item.opts.forEach((o,n)=>{
        h+='<label class="opt" id="l_'+item.id+'_'+n+'"><input type="'+t+'" name="'+item.id+'" value="'+o.replace(/"/g,"&quot;")+'" onchange="mark(\''+item.id+'\')">'+o+'</label>';
      });
      if(item.extra) h+='<div class="extra"><input type="text" id="'+item.id+'_x" placeholder="'+item.extra+'"></div>';
    }
    h+='</div>';
  });
  if(open) h+="</div>";
  document.getElementById("form").innerHTML=h;
}
function mark(id){
  document.querySelectorAll('input[name="'+id+'"]').forEach((el,n)=>{
    document.getElementById("l_"+id+"_"+n).classList.toggle("sel", el.checked);
  });
}
function val(item){
  if(item.type==="text"||item.type==="textarea"){ const e=document.getElementById(item.id); return e?e.value:""; }
  if(item.type==="fields"){ return item.fields.map((f,n)=>{ const v=document.getElementById(item.id+"_"+n).value; return v?f+" : "+v:""; }).filter(Boolean).join("\n"); }
  const sel=[...document.querySelectorAll('input[name="'+item.id+'"]:checked')].map(e=>e.value);
  const x=document.getElementById(item.id+"_x");
  if(x&&x.value) sel.push("→ "+x.value);
  return sel.join(" | ");
}
async function send(){
  const btn=document.getElementById("send"), msg=document.getElementById("msg");
  const data={};
  Q.forEach(item=>{ if(item.id) data[item.id]=val(item); });
  if(!data.repondant){ msg.textContent="Gelieve uw naam in te vullen."; window.scrollTo({top:0,behavior:"smooth"}); return; }
  // regroeperen per hoofdvraag
  const p={repondant:data.repondant, entreprise:data.entreprise, email:data.email, bonus:data.bonus};
  for(let i=1;i<=20;i++){
    const parts=[];
    ["q"+i,"q"+i+"b","q"+i+"c"].forEach(k=>{ if(data[k]) parts.push((k.endsWith("b")||k.endsWith("c")?"• ":"")+data[k]); });
    if(parts.length) p["q"+i]=parts.join("\n");
  }
  btn.disabled=true; btn.textContent="Versturen…"; msg.textContent="";
  try{
    const r=await fetch("/api/cadrage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});
    if(!r.ok){ const d=await r.json(); msg.textContent="Fout: "+(d.error||"versturen mislukt"); btn.disabled=false; btn.textContent="Antwoorden versturen"; return; }
    document.getElementById("form").style.display="none";
    btn.style.display="none";
    document.getElementById("done").style.display="block";
    window.scrollTo({top:0,behavior:"smooth"});
  }catch(e){ msg.textContent="Netwerkfout."; btn.disabled=false; btn.textContent="Antwoorden versturen"; }
}
build();
</script>
</body>
</html>
