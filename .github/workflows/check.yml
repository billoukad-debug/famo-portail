name: Controle du code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  controle:
    name: Syntaxe et lint API
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verifier les API et scripts HTML
        run: node scripts/check.js
      - name: Verifier les variables API
        run: npx --yes eslint@9 api/
