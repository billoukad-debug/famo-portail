<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Famo Trading — Documenten</title><link rel="stylesheet" href="/staff.css"><style>.d-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}.d-tools input{flex:1;min-width:230px}.d-table{margin-top:16px;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden}.d-table table{width:100%;border-collapse:collapse}.d-table th{padding:10px 13px;text-align:left;background:#fafafa;border-bottom:1px solid #e8e8e8;color:#969696;font-size:11px;font-weight:500}.d-table td{padding:12px 13px;border-bottom:1px solid #f0f0f0;font-size:12.5px}.d-table tr:last-child td{border:0}.d-num{font:500 12px Geist Mono,ui-monospace,monospace}.d-doc{display:none;padding:14px 2px;border-bottom:1px solid #eee}.d-doc:first-child{border-top:1px solid #eee}.d-doc b{font-size:13.5px}.d-doc p{margin:5px 0;color:#666;font-size:12px}.d-doc-footer{display:flex;gap:8px;align-items:center}@media(max-width:780px){.d-table{display:none}.d-list{display:block;margin-top:16px}.d-tools input{width:100%;flex:auto}}@media(min-width:781px){.d-list{display:none}}</style></head><body><section id="login" class="staff-login"><div><h1>Documenten</h1><p>Zoek leveringsbonnen en facturen uit de echte bestellingen.</p><input id="code" type="password" autocomplete="current-password" placeholder="Personeelscode"><button onclick="enter()">Aanmelden</button><div id="err" class="staff-login-error" role="alert"></div></div></section><div id="app" class="hidden staff-shell"><aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside><nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav><main class="staff-main"><div class="staff-page"><header class="staff-page-head"><div><h1>Documenten</h1><p>Interne leveringsbonnen en facturen uit de actuele bestellingen.</p></div><div><button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div class="d-tools"><input id="q" class="staff-field" type="search" placeholder="Documentnummer, bestelling of klant…" oninput="render()"><select id="type" class="staff-select" onchange="render()"><option value="all">Alle types</option><option value="delivery">Leveringsbonnen</option><option value="invoice">Facturen</option><option value="credit">Creditnota’s (intern)</option></select><select id="state" class="staff-select" onchange="render()"><option value="all">Alle statussen</option><option value="available">Beschikbaar</option><option value="blocked">Geblokkeerd</option></select></div><div id="count" class="staff-count" style="margin-top:11px"></div><div id="table" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div><div id="cards" class="d-list"></div></div></main></div><script src="/documents.js"></script>
<script src="/staff-doc-preview.js"></script>
<script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ORDERS=[],DOCS=[];
const esc=FamoDocuments.esc,eur=FamoDocuments.eur;
const URL_ORDER=new URLSearchParams(location.search).get("order")||"";
const URL_TYPE_RAW=(new URLSearchParams(location.search).get("type")||"").toLowerCase();
const TYPE_MAP={lb:"delivery",facture:"invoice",credit:"credit"};
const URL_TYPE=TYPE_MAP[URL_TYPE_RAW]||"";
function applyUrlFilters(){
  if(URL_TYPE){
    const sel=document.getElementById("type");
    if(sel)sel.value=URL_TYPE;
  }
  if(URL_ORDER){
    const q=document.getElementById("q");
    if(q&&!q.value){
      const hit=ORDERS.find(o=>o.id===URL_ORDER||o.ref===URL_ORDER);
      if(hit)q.value=hit.ref;
    }
  }
}
function makeDocs(){DOCS=[];ORDERS.forEach(o=>{const lb={order:o,type:"delivery",label:"Leveringsbon",number:FamoDocuments.number(o,"delivery"),available:o.statut!=="Reçue",reason:"Beschikbaar na voorbereiding",date:o.prepareeLe||o.date||""};DOCS.push(lb);DOCS.push({order:o,type:"invoice",label:"Factuur",number:o.factuurnummer||"—",available:!!o.factuurnummer,reason:o.factuurnummer?"Beschikbaar":"Geblokkeerd — levering nog niet bevestigd",date:o.factureeLe||"",amount:o.factuurnummer?o.total:null});DOCS.push({order:o,type:"credit",label:"Creditnota (intern)",number:FamoDocuments.number(o,"credit"),available:!!o.factuurnummer,reason:o.factuurnummer?"Intern document — geen Peppol":"Beschikbaar na factuur",date:o.factureeLe||"",amount:o.factuurnummer?-Math.abs(Number(o.total||0)):null})})}
const loginCtl=famoStaff.bindLogin({code:"code",error:"err",loginView:"login",appView:"app",onReady:load});
function enter(){loginCtl.enter()}
async function load(){const box=document.getElementById("table");box.className="staff-loading";box.innerHTML='<div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div>';try{const r=await famoStaff.api("/api/allorders"),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Documenten konden niet worden geladen.");ORDERS=d.orders||[];makeDocs();applyUrlFilters();render();if(URL_ORDER&&URL_TYPE){const hit=DOCS.find(x=>(x.order.id===URL_ORDER||x.order.ref===URL_ORDER)&&x.type===URL_TYPE&&x.available);if(hit)setTimeout(()=>preview(hit.type,hit.order.id),120)}}catch(e){box.className="staff-error";box.innerHTML=esc(famoStaff.translateError(e.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>'}}
function filter(){const q=document.getElementById("q").value.toLowerCase(),t=document.getElementById("type").value,s=document.getElementById("state").value;return DOCS.filter(d=>(!q||(d.number+" "+d.order.ref+" "+d.order.client).toLowerCase().includes(q))&&(t==="all"||d.type===t)&&(s==="all"||(s==="available"&&d.available)||(s==="blocked"&&!d.available)))}
function row(d){return '<tr><td class="d-num">'+esc(d.number)+'</td><td>'+d.label+'</td><td><a href="/order.html?id='+encodeURIComponent(d.order.id)+'">'+esc(d.order.ref)+'</a></td><td>'+esc(d.order.client)+'</td><td>'+FamoDocuments.date(d.date)+'</td><td>'+(d.amount==null?'—':eur(d.amount))+'</td><td><span class="staff-status" style="--status:'+(d.available?'#2e7d53':'#b23b2e')+'">'+esc(d.available?'Beschikbaar':d.reason)+'</span></td><td>'+(d.available?'<button class="staff-action-secondary" onclick="preview(\''+d.type+'\',\''+esc(d.order.id)+'\')">Voorbeeld</button>':'')+'</td></tr>'}
function card(d){return '<article class="d-doc"><b>'+esc(d.number)+' · '+d.label+'</b><p>'+esc(d.order.ref)+' · '+esc(d.order.client)+' · '+FamoDocuments.date(d.date)+'</p><div class="d-doc-footer"><span class="staff-status" style="--status:'+(d.available?'#2e7d53':'#b23b2e')+'">'+esc(d.available?'Beschikbaar':d.reason)+'</span>'+(d.available?'<button class="staff-action-secondary" onclick="preview(\''+d.type+'\',\''+esc(d.order.id)+'\')">Voorbeeld</button>':'')+'</div></article>'}
function render(){const list=filter(),table=document.getElementById("table"),cards=document.getElementById("cards");document.getElementById("count").textContent=list.length+' documenten';if(!list.length){table.className="staff-empty";table.textContent="Geen documenten voor deze selectie.";cards.innerHTML="";return}table.className="d-table";table.innerHTML='<table><thead><tr><th>Nummer</th><th>Type</th><th>Bestelling</th><th>Klant</th><th>Datum</th><th>Bedrag</th><th>Status</th><th></th></tr></thead><tbody>'+list.map(row).join("")+'</tbody></table>';cards.innerHTML=list.map(card).join("")}
function preview(type,id){
  const order=ORDERS.find(o=>o.id===id);
  if(!order)return;
  const labels={delivery:"Leveringsbon",invoice:"Factuur",credit:"Creditnota (intern)"};
  const num=FamoDocuments.number(order,type);
  famoDocPreview.open({
    title:labels[type]||"Document",
    meta:num+" · "+(order.ref||""),
    filename:FamoDocuments.filename(order,type),
    html:FamoDocuments.build(order,type)
  });
}
async function logout(){await loginCtl.logout()}
</script></body></html>
