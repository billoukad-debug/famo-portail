<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Famo Trading — Documenten</title><link rel="stylesheet" href="/staff.css"><style>.d-login{min-height:100vh;display:grid;place-items:center;padding:20px}.d-login>div{width:min(100%,390px);padding:28px;border:1px solid #e8e8e8;border-radius:14px;background:#fff}.d-login h1{margin:0 0 5px;font-size:20px}.d-login p{color:#666;font-size:13.5px}.d-login input{width:100%;height:42px;padding:0 12px;margin:5px 0 9px}.d-login button{width:100%;height:42px;border:0;border-radius:9px;background:#111;color:#fff}.d-err{min-height:18px;margin-top:8px;color:#b23b2e;font-size:12px}.d-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}.d-tools input{flex:1;min-width:230px}.d-table{margin-top:16px;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden}.d-table table{width:100%;border-collapse:collapse}.d-table th{padding:10px 13px;text-align:left;background:#fafafa;border-bottom:1px solid #e8e8e8;color:#969696;font-size:11px;font-weight:500}.d-table td{padding:12px 13px;border-bottom:1px solid #f0f0f0;font-size:12.5px}.d-table tr:last-child td{border:0}.d-num{font:500 12px Geist Mono,ui-monospace,monospace}.d-doc{display:none;padding:14px 2px;border-bottom:1px solid #eee}.d-doc:first-child{border-top:1px solid #eee}.d-doc b{font-size:13.5px}.d-doc p{margin:5px 0;color:#666;font-size:12px}.d-doc-footer{display:flex;gap:8px;align-items:center}.d-modal{position:fixed;inset:0;z-index:200;display:grid;place-items:center;padding:20px;background:rgba(0,0,0,.32)}.d-modal-box{width:min(900px,100%);height:min(88vh,900px);display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden;border-radius:14px;background:#fff}.d-modal-top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #e8e8e8}.d-modal iframe{width:100%;height:100%;border:0}@media(max-width:780px){.d-table{display:none}.d-list{display:block;margin-top:16px}.d-tools input{width:100%;flex:auto}.d-modal{padding:0}.d-modal-box{width:100%;height:100%;border-radius:0}}@media(min-width:781px){.d-list{display:none}}</style></head><body><section id="login" class="d-login"><div><h1>Documenten</h1><p>Zoek leveringsbonnen en facturen uit de echte bestellingen.</p><input id="code" type="password" placeholder="Personeelscode"><button onclick="enter()">Aanmelden</button><div id="err" class="d-err"></div></div></section><div id="app" class="hidden staff-shell"><aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside><nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav><main class="staff-main"><div class="staff-page"><header class="staff-page-head"><div><h1>Documenten</h1><p>Interne leveringsbonnen en facturen uit de actuele bestellingen.</p></div><div><button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div class="d-tools"><input id="q" class="staff-field" type="search" placeholder="Documentnummer, bestelling of klant…" oninput="render()"><select id="type" class="staff-select" onchange="render()"><option value="all">Alle types</option><option value="delivery">Leveringsbonnen</option><option value="invoice">Facturen</option></select><select id="state" class="staff-select" onchange="render()"><option value="all">Alle statussen</option><option value="available">Beschikbaar</option><option value="blocked">Geblokkeerd</option></select></div><div id="count" class="staff-count" style="margin-top:11px"></div><div id="table" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div><div id="cards" class="d-list"></div></div></main></div><div id="modal" class="hidden"></div><script src="/documents.js"></script>
<script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ORDERS=[],DOCS=[];
const esc=FamoDocuments.esc,eur=FamoDocuments.eur;
function makeDocs(){DOCS=[];ORDERS.forEach(o=>{const lb={order:o,type:"delivery",label:"Leveringsbon",number:FamoDocuments.number(o,"delivery"),available:o.statut!=="Reçue",reason:"Beschikbaar na voorbereiding",date:o.prepareeLe||o.date||""};DOCS.push(lb);DOCS.push({order:o,type:"invoice",label:"Factuur",number:o.factuurnummer||"—",available:!!o.factuurnummer,reason:o.factuurnummer?"Beschikbaar":"Geblokkeerd — levering nog niet bevestigd",date:o.factureeLe||"",amount:o.factuurnummer?o.total:null})})}
async function enter(){
  const input=document.getElementById("code"),err=document.getElementById("err");
  const code=(input.value||"").trim();
  if(!code){err.textContent="Vul de personeelscode in.";return}
  if(enter._busy)return;enter._busy=true;
  err.textContent="Controleren…";
  try{
    await famoStaff.login(code);
    input.value="";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await load();
  }catch(e){err.textContent=famoStaff.translateError(e.message||e)}
  finally{enter._busy=false}
}
async function load(){const box=document.getElementById("table");box.className="staff-loading";box.innerHTML='<div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div>';try{const r=await famoStaff.api("/api/allorders"),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Documenten konden niet worden geladen.");ORDERS=d.orders||[];makeDocs();render()}catch(e){box.className="staff-error";box.innerHTML=esc(famoStaff.translateError(e.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>'}}
function filter(){const q=document.getElementById("q").value.toLowerCase(),t=document.getElementById("type").value,s=document.getElementById("state").value;return DOCS.filter(d=>(!q||(d.number+" "+d.order.ref+" "+d.order.client).toLowerCase().includes(q))&&(t==="all"||d.type===t)&&(s==="all"||(s==="available"&&d.available)||(s==="blocked"&&!d.available)))}
function row(d){return '<tr><td class="d-num">'+esc(d.number)+'</td><td>'+d.label+'</td><td><a href="/order.html?id='+encodeURIComponent(d.order.id)+'">'+esc(d.order.ref)+'</a></td><td>'+esc(d.order.client)+'</td><td>'+FamoDocuments.date(d.date)+'</td><td>'+(d.amount==null?'—':eur(d.amount))+'</td><td><span class="staff-status" style="--status:'+(d.available?'#2e7d53':'#b23b2e')+'">'+esc(d.available?'Beschikbaar':d.reason)+'</span></td><td>'+(d.available?'<button class="staff-action-secondary" onclick="preview(\''+d.type+'\',\''+esc(d.order.id)+'\')">Voorbeeld</button>':'')+'</td></tr>'}
function card(d){return '<article class="d-doc"><b>'+esc(d.number)+' · '+d.label+'</b><p>'+esc(d.order.ref)+' · '+esc(d.order.client)+' · '+FamoDocuments.date(d.date)+'</p><div class="d-doc-footer"><span class="staff-status" style="--status:'+(d.available?'#2e7d53':'#b23b2e')+'">'+esc(d.available?'Beschikbaar':d.reason)+'</span>'+(d.available?'<button class="staff-action-secondary" onclick="preview(\''+d.type+'\',\''+esc(d.order.id)+'\')">Voorbeeld</button>':'')+'</div></article>'}
function render(){const list=filter(),table=document.getElementById("table"),cards=document.getElementById("cards");document.getElementById("count").textContent=list.length+' documenten';if(!list.length){table.className="staff-empty";table.textContent="Geen documenten voor deze selectie.";cards.innerHTML="";return}table.className="d-table";table.innerHTML='<table><thead><tr><th>Nummer</th><th>Type</th><th>Bestelling</th><th>Klant</th><th>Datum</th><th>Bedrag</th><th>Status</th><th></th></tr></thead><tbody>'+list.map(row).join("")+'</tbody></table>';cards.innerHTML=list.map(card).join("")}
function preview(type,id){const order=ORDERS.find(o=>o.id===id);if(!order)return;document.getElementById("modal").className="d-modal";document.getElementById("modal").innerHTML='<div class="d-modal-box"><div class="d-modal-top"><b>'+esc(FamoDocuments.number(order,type))+'</b><span><button class="staff-action-secondary" onclick="closeModal()">Sluiten</button><button class="staff-action" onclick="printDoc()">Afdrukken</button></span></div><iframe id="frame" title="Documentvoorbeeld"></iframe></div>';document.getElementById("frame").srcdoc=FamoDocuments.build(order,type)}
function closeModal(){document.getElementById("modal").className="hidden";document.getElementById("modal").innerHTML=""}
function printDoc(){const f=document.getElementById("frame");if(f&&f.contentWindow)f.contentWindow.print()}
async function logout(){await famoStaff.logout();location.reload()}
document.getElementById("code").addEventListener("keydown",e=>{if(e.key==="Enter")enter()});
window.addEventListener("DOMContentLoaded",async()=>{
  try{
    if(await famoStaff.check()){
      document.getElementById("login").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      await load();
      return;
    }
  }catch(e){}
});
</script></body></html>
