<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Famo Trading — Voorraad</title><link rel="stylesheet" href="/staff.css"><style>.s-login{min-height:100vh;display:grid;place-items:center;padding:20px}.s-login>div{width:min(100%,390px);padding:28px;border:1px solid #e8e8e8;border-radius:14px;background:#fff}.s-login h1{margin:0 0 5px;font-size:20px}.s-login p{color:#666;font-size:13.5px}.s-login input{width:100%;height:42px;padding:0 12px;margin:5px 0 9px}.s-login button{width:100%;height:42px;border:0;border-radius:9px;background:#111;color:#fff}.s-error{min-height:18px;margin-top:8px;color:#b23b2e;font-size:12px}.stock-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:22px}.stock-tools input{flex:1;min-width:220px}.stock-filters{display:flex;gap:5px;background:#f0f0f0;padding:3px;border-radius:9px}.stock-filters button{height:32px;padding:0 10px;border:0;border-radius:7px;background:transparent;color:#666;font-size:12.5px}.stock-filters button.active{background:#fff;color:#111;box-shadow:0 1px 2px #0001}.stock-table{margin-top:16px;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden}.stock-table table{width:100%;border-collapse:collapse}.stock-table th{padding:10px 13px;text-align:left;background:#fafafa;border-bottom:1px solid #e8e8e8;color:#969696;font-size:11px;font-weight:500}.stock-table td{padding:12px 13px;border-bottom:1px solid #f0f0f0;font-size:12.5px;vertical-align:top}.stock-product{font-weight:500}.stock-qty{font:500 14px Geist Mono,ui-monospace,monospace}.stock-low{color:#9a6700}.stock-edit{display:grid;grid-template-columns:92px 1fr 150px auto;gap:6px}.stock-edit input,.stock-edit select{height:36px;min-width:0;padding:0 8px;font-size:12px}.stock-edit button{height:36px;padding:0 10px;border:1px solid #111;border-radius:8px;background:#111;color:#fff;font-size:12px}.stock-msg{margin-top:5px;font-size:11px;color:#22633e}.stock-msg.error{color:#b23b2e}.stock-cards{display:none;margin-top:16px}.stock-card{padding:14px 2px;border-bottom:1px solid #eee}.stock-card:first-child{border-top:1px solid #eee}.stock-card-head{display:flex;justify-content:space-between;gap:10px}.stock-card-form{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}.stock-card-form input,.stock-card-form select{height:38px;padding:0 9px}.stock-card-form input.note{grid-column:1/-1}.stock-card-form button{height:40px;border:1px solid #111;border-radius:9px;background:#111;color:#fff}@media(max-width:900px){.stock-table{display:none}.stock-cards{display:block}.stock-tools input{width:100%;flex:auto}}@media(max-width:520px){.stock-tools>*{width:100%}.stock-filters{width:max-content}}</style></head><body><section id="login" class="staff-login"><div><h1>Voorraad</h1><p>Werk voorraad alleen bij na telling, ontvangst of retour.</p><input id="code" type="password" placeholder="Personeelscode" autocomplete="current-password"><button type="button" onclick="enter()">Aanmelden</button><div id="err" class="staff-login-error" role="alert"></div></div></section><div id="app" class="hidden staff-shell"><aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside><nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav><main class="staff-main"><div class="staff-page"><header class="staff-page-head"><div><h1>Voorraad</h1><p>Beschikbare hoeveelheid, minimumgrens en traceerbare correcties.</p></div><div><button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div class="stock-tools"><input id="q" class="staff-field" type="search" placeholder="Zoek product…" oninput="render()"><div class="stock-filters"><button id="all" class="active" onclick="setFilter('all')">Alle</button><button id="low" onclick="setFilter('low')">Laag</button><button id="zero" onclick="setFilter('zero')">Geen voorraad</button></div></div><div id="summary" class="staff-count" style="margin-top:11px"></div><div id="table" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div><div id="cards" class="stock-cards"></div></div></main></div><script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ITEMS=[],FILTER="all",BUSY={};
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}
function low(x){return x.lowThreshold>0&&x.quantity<=x.lowThreshold}
const loginCtl=famoStaff.bindLogin({code:"code",error:"err",loginView:"login",appView:"app",onReady:load});
function enter(){loginCtl.enter()}
async function logout(){await loginCtl.logout()}
async function load(){const box=document.getElementById("table");box.className="staff-loading";box.innerHTML='<div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div>';try{const r=await famoStaff.api("/api/stock"),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Voorraad kon niet worden geladen.");ITEMS=d.items||[];render()}catch(e){box.className="staff-error";box.innerHTML=esc(famoStaff.translateError(e.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>'}}
function setFilter(f){FILTER=f;["all","low","zero"].forEach(x=>document.getElementById(x).classList.toggle("active",x===f));render()}
function list(){const q=document.getElementById("q").value.toLowerCase();return ITEMS.filter(x=>x.product.toLowerCase().includes(q)).filter(x=>FILTER==="all"||(FILTER==="low"&&low(x))||(FILTER==="zero"&&x.quantity===0))}
function form(x,card=false){const p=card?'stock-card-form':'stock-edit';return '<div class="'+p+'"><input id="n_'+x.id+'" type="number" min="0" step="0.001" value="'+x.quantity+'"><select id="t_'+x.id+'"><option value="Correction inventaire">'+esc(famoNL.move("Correction inventaire"))+'</option><option value="Entrée stock">'+esc(famoNL.move("Entrée stock"))+'</option><option value="Retour client">'+esc(famoNL.move("Retour client"))+'</option></select><input class="note" id="r_'+x.id+'" maxlength="200" placeholder="Reden of referentie"><button id="b_'+x.id+'" onclick="save(\''+x.id+'\')">Opslaan</button><div id="m_'+x.id+'" class="stock-msg"></div></div>'}
function render(){const rows=list(),lowCount=ITEMS.filter(low).length,zeroCount=ITEMS.filter(x=>x.quantity===0).length;document.getElementById("summary").textContent=rows.length+' getoond · '+lowCount+' laag · '+zeroCount+' zonder voorraad';const table=document.getElementById("table"),cards=document.getElementById("cards");if(!rows.length){table.className="staff-empty";table.textContent="Geen producten voor deze selectie.";cards.innerHTML="";return}table.className="stock-table";table.innerHTML='<table><thead><tr><th>Product</th><th>Beschikbaar</th><th>Grens</th><th>Voorraadbeweging</th></tr></thead><tbody>'+rows.map(x=>'<tr><td class="stock-product">'+esc(x.product)+'</td><td class="stock-qty '+(low(x)?'stock-low':'')+'">'+x.quantity+'</td><td>'+ (x.lowThreshold||'—')+'</td><td>'+form(x)+'</td></tr>').join("")+'</tbody></table>';cards.innerHTML=rows.map(x=>'<article class="stock-card"><div class="stock-card-head"><b>'+esc(x.product)+'</b><span class="stock-qty '+(low(x)?'stock-low':'')+'">'+x.quantity+'</span></div><div class="staff-count">Laagste grens: '+(x.lowThreshold||'—')+'</div>'+form(x,true)+'</article>').join("")}
function message(id,text,error){const m=document.getElementById("m_"+id);if(m){m.textContent=text;m.className="stock-msg"+(error?" error":"")}}
async function save(id){if(BUSY[id])return;const q=Number(document.getElementById("n_"+id).value),type=document.getElementById("t_"+id).value,note=document.getElementById("r_"+id).value.trim();if(!Number.isFinite(q)||q<0)return message(id,"Geef een geldige hoeveelheid in.",true);if(!note)return message(id,"Vul reden of referentie in.",true);BUSY[id]=true;const b=document.getElementById("b_"+id);if(b)b.disabled=true;try{const r=await famoStaff.api("/api/stock",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,quantity:q,movementType:type,note})}),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Opslaan mislukt.");const item=ITEMS.find(x=>x.id===id);if(item)item.quantity=d.quantity;message(id,d.journalWarning?'Voorraad bijgewerkt; journaal: '+d.journalWarning:'Voorraad en journaal bijgewerkt.');setTimeout(render,700)}catch(e){message(id,famoStaff.translateError(e.message||"Netwerkfout."),true)}finally{BUSY[id]=false;if(b)b.disabled=false}}
</script></body></html>
