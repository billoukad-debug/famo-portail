<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famo Trading — Bestelling invoeren</title>
<link rel="stylesheet" href="/staff.css">
<style>
.invoer-grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;margin-top:22px;align-items:start}
.invoer-card{border:1px solid #e8e8e8;border-radius:12px;background:#fff;padding:18px}
.invoer-card h2{margin:0 0 12px;font-size:14px;font-weight:600}
.invoer-card.sticky{position:sticky;top:24px}
.fld-l{display:block;font-size:11px;font-weight:600;color:#777;margin:12px 0 5px;text-transform:uppercase;letter-spacing:.05em}
.invoer-card select,.invoer-card input[type=date],.invoer-card input[type=text],.invoer-card textarea{width:100%;min-height:42px;padding:10px 11px;border:1px solid #dedede;border-radius:8px;background:#fff;font:inherit}
.invoer-card textarea{min-height:52px;resize:vertical}
.src{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.src button{flex:1;min-width:80px;min-height:40px;border:1px solid #e0e0e0;background:#fff;border-radius:8px;font-size:13px;font-weight:600;color:#666;cursor:pointer}
.src button.on{border-color:#111;background:#111;color:#fff}
.cat-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#777;margin:18px 2px 6px}
.prow{display:flex;align-items:center;gap:10px;padding:12px 2px;border-bottom:1px solid #f0f0f0}
.pinfo{flex:1;min-width:0}.pname{font-weight:550;font-size:14px}.pmeta{font-size:12.5px;color:#666;margin-top:2px}
.pprice{font:600 13px Geist Mono,ui-monospace,monospace;color:#111}.pbase{text-decoration:line-through;color:#aaa;font-size:11.5px;margin-left:5px}
.tag{background:#f1f1f1;color:#555;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:5px}
.qty{display:flex;align-items:center;gap:6px}
.qty button{width:40px;height:40px;border:1px solid #dedede;background:#fff;border-radius:8px;font-size:18px;color:#111;font-weight:600;cursor:pointer}
.qty input{width:56px;height:40px;text-align:center;border:1px solid #dedede;border-radius:8px;font:600 14px Geist Mono,ui-monospace,monospace}
.cmt-in{width:100%;margin-top:6px;padding:8px 9px;border:1px solid #dedede;border-radius:8px;font-size:12.5px;background:#fafafa}
.cline{padding:8px 0;border-bottom:1px solid #f2f5f7;font-size:13.5px}.cline .r1{display:flex;justify-content:space-between;gap:10px}.cline .cm{font-size:12px;color:#666;font-style:italic}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;padding-top:12px;border-top:1px solid #e0e0e0}
.total-row .val{font:700 22px Geist Mono,ui-monospace,monospace;color:#111}
.empty{color:#989898;font-size:13px;padding:12px 0;text-align:center}
.ok-box{background:#edf7ef;border:1px solid #b8ddc0;color:#1e5f3d;padding:13px;border-radius:9px;margin-top:12px;font-size:13.5px;display:none}
.review-box{margin-top:14px;padding:14px;border:1px solid #e3e3e3;border-radius:9px;background:#fafafa}
.review-box h3{font-size:13px;margin:0 0 8px}.review-line{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid #e7ecef;font-size:13px}
.review-line:last-of-type{border-bottom:0}.review-meta{font-size:12px;color:#666;line-height:1.6;margin-bottom:10px}
.review-actions{display:flex;gap:8px;margin-top:12px}.review-actions button{flex:1;min-height:44px;border-radius:8px;border:1px solid #e0e0e0;font-weight:600;cursor:pointer;background:#fff}
.review-actions .confirm{border-color:#111;background:#111;color:#fff}
.btn-p{width:100%;min-height:44px;margin-top:14px;border:1px solid #111;border-radius:9px;background:#111;color:#fff;font-weight:600;cursor:pointer}
.btn-p:disabled{opacity:.55;cursor:default}
@media(max-width:880px){.invoer-grid{grid-template-columns:1fr}.invoer-card.sticky{position:static;order:-1}}
@media(max-width:560px){.prow{align-items:flex-start;flex-wrap:wrap}.pinfo{min-width:100%}.qty{width:100%;justify-content:flex-end}}
</style>
</head>
<body>

<section id="loginView" class="staff-login">
  <div>
    <h1>Bestelling invoeren</h1>
    <p>Voor telefoon- en WhatsApp-bestellingen</p>
    <input id="code" type="password" placeholder="Personeelscode" autocomplete="current-password">
    <button type="button" onclick="enter()">Aanmelden</button>
    <div id="err" class="staff-login-error" role="alert"></div>
  </div>
</section>

<div id="app" class="hidden staff-shell">
  <aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside>
  <nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav>
  <main class="staff-main"><div class="staff-page">
    <header class="staff-page-head">
      <div><h1>Bestelling invoeren</h1><p>Kies een klant, voeg artikelen toe en sla de bestelling op in het magazijn.</p></div>
      <div><a class="staff-action-secondary" href="/entrepot.html" style="display:inline-flex;align-items:center;text-decoration:none">Magazijn</a></div>
    </header>
    <div class="invoer-grid">
    <div class="invoer-card">
      <label class="fld-l">Klant</label>
      <select id="clientSel" onchange="loadClient()"><option value="">— Kies een klant —</option></select>
      <div id="catBox" class="hidden">
        <h2 style="margin-top:18px">Artikelen</h2>
        <div id="catalogue"></div>
      </div>
      <div id="noClient" class="empty">Kies eerst een klant om de artikelen en zijn prijzen te zien.</div>
    </div>

    <div class="invoer-card sticky">
      <h2>Bestelling</h2>
      <div id="cart"><div class="empty">Nog niets gekozen.</div></div>
      <div id="totalBox" class="hidden"><div class="total-row"><span style="font-size:13px;color:#666;font-weight:600">TOTAAL</span><span class="val" id="totalVal">€ 0,00</span></div></div>

      <label class="fld-l">Bron van de bestelling</label>
      <div class="src">
        <button id="s1" class="on" onclick="setSrc('WhatsApp',this)">WhatsApp</button>
        <button id="s2" onclick="setSrc('Telefoon',this)">Telefoon</button>
        <button id="s3" onclick="setSrc('E-mail',this)">E-mail</button>
        <button id="s4" onclick="setSrc('Ter plaatse',this)">Ter plaatse</button>
      </div>

      <label class="fld-l">Leverdatum</label>
      <input type="date" id="dateLiv" onchange="hideReview()">
      <label class="fld-l">Opmerking</label>
      <textarea id="notes" placeholder="Bv. leveren vóór 8u…" oninput="hideReview()"></textarea>

      <div id="reviewBox" class="review-box hidden"></div>
      <button class="btn-p" id="sendBtn" style="margin-top:14px" disabled onclick="reviewOrder()">Bestelling controleren</button>
      <div class="ok-box" id="okBox"></div>
    </div>
    </div>
  </div></main>
</div>

<script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let CLIENTS=[], PRODUCTS=[], panier={}, comments={}, SRC="WhatsApp", CID="";
const eur=n=>"€ "+Number(n).toFixed(2).replace(".",",");
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

async function showAppAfterSession(){
  const r=await famoStaff.api("/api/staff"),d=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||"Sessie ongeldig");
  CLIENTS=d.clients||[];
  document.getElementById("clientSel").innerHTML='<option value="">— Kies een klant —</option>'+
    CLIENTS.map(c=>'<option value="'+c.id+'">'+esc(c.nom)+'</option>').join("");
  const tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1); const p=n=>String(n).padStart(2,"0"); document.getElementById("dateLiv").value=tomorrow.getFullYear()+"-"+p(tomorrow.getMonth()+1)+"-"+p(tomorrow.getDate());
}

const loginCtl=famoStaff.bindLogin({code:"code",error:"err",loginView:"loginView",appView:"app",onReady:showAppAfterSession});
function enter(){loginCtl.enter()}
async function logout(){await loginCtl.logout()}

async function loadClient(){
  CID=document.getElementById("clientSel").value;
  panier={}; comments={}; renderCart();
  if(!CID){ document.getElementById("catBox").classList.add("hidden"); document.getElementById("noClient").classList.remove("hidden"); return; }
  const r=await famoStaff.api("/api/staff?client="+encodeURIComponent(CID));
  const d=await r.json();
  PRODUCTS=d.products||[];
  document.getElementById("noClient").classList.add("hidden");
  document.getElementById("catBox").classList.remove("hidden");
  renderCatalogue();
}

function renderCatalogue(){
  const cats={};
  PRODUCTS.forEach((p,i)=>{ const c=p.cat||"Overige"; (cats[c]=cats[c]||[]).push({p,i}); });
  let h="";
  Object.keys(cats).sort().forEach(cat=>{
    h+='<div class="cat-h">'+esc(cat)+'</div>';
    h+=cats[cat].map(({p,i})=>{
      const neg=p.prix<p.base;
      const unit=famoNL.unit(p.unite)||p.unite;
      return '<div class="prow"><div class="pinfo"><div class="pname">'+esc(p.nom)+'</div>'+
        '<div class="pmeta"><span class="pprice">'+eur(p.prix)+'</span>'+(neg?'<span class="pbase">'+eur(p.base)+'</span><span class="tag">klantprijs</span>':'')+' / '+esc(unit)+'</div>'+
        (panier[i]?'<input class="cmt-in" placeholder="Opmerking…" value="'+esc(comments[i]||"")+'" oninput="setCmt('+i+',this.value)">':'')+
        '</div><div class="qty"><button onclick="chg('+i+',-1)">−</button>'+
        '<input id="q'+i+'" type="number" min="0" step="'+(/kg/i.test(String(p.unite||''))?.1:1)+'" value="'+(panier[i]||0)+'" onchange="setQ('+i+',this.value)">'+
        '<button onclick="chg('+i+',1)">+</button></div></div>';
    }).join("");
  });
  document.getElementById("catalogue").innerHTML=h||'<div class="empty">Geen artikelen.</div>';
}
function stepFor(i){ return /kg/i.test(String((PRODUCTS[i]||{}).unite||""))?.1:1; }
function chg(i,d){ setQ(i,(panier[i]||0)+d*stepFor(i)); }
function setQ(i,v){ v=Math.max(0,Math.round((parseFloat(String(v).replace(",","."))||0)*1000)/1000); if(stepFor(i)===1)v=Math.round(v); if(v===0){ delete panier[i]; delete comments[i]; } else panier[i]=v; renderCatalogue(); renderCart(); }
function setCmt(i,v){ comments[i]=v; renderCart(); }
function setSrc(s,el){ SRC=s; ["s1","s2","s3","s4"].forEach(id=>document.getElementById(id).classList.remove("on")); el.classList.add("on"); hideReview(); }

function renderCart(){
  const cart=document.getElementById("cart"), keys=Object.keys(panier);
  hideReview();
  if(!keys.length){ cart.innerHTML='<div class="empty">Nog niets gekozen.</div>'; document.getElementById("totalBox").classList.add("hidden"); document.getElementById("sendBtn").disabled=true; return; }
  let total=0;
  cart.innerHTML=keys.map(i=>{ const p=PRODUCTS[i],qn=panier[i],st=p.prix*qn; total+=st;
    return '<div class="cline"><div class="r1"><span>'+esc(p.nom)+' × '+qn+'</span><span>'+eur(st)+'</span></div>'+(comments[i]?'<div class="cm">↳ '+esc(comments[i])+'</div>':'')+'</div>'; }).join("");
  document.getElementById("totalVal").textContent=eur(total);
  document.getElementById("totalBox").classList.remove("hidden");
  document.getElementById("sendBtn").disabled=false; document.getElementById("sendBtn").textContent="Bestelling controleren";
}

function hideReview(){ const box=document.getElementById("reviewBox"); if(box){ box.classList.add("hidden"); box.innerHTML=""; } }
function reviewOrder(){
  const keys=Object.keys(panier); if(!keys.length||!CID) return;
  const total=keys.reduce((sum,i)=>sum+PRODUCTS[i].prix*panier[i],0), client=(CLIENTS.find(c=>c.id===CID)||{}).nom||"—";
  const box=document.getElementById("reviewBox");
  box.innerHTML='<h3>Controleer de bestelling</h3><div class="review-meta"><b>'+esc(client)+'</b><br>Levering: '+esc(document.getElementById("dateLiv").value||"Niet opgegeven")+' · Bron: '+esc(SRC)+'</div>'+keys.map(i=>'<div class="review-line"><span>'+esc(PRODUCTS[i].nom)+' × '+panier[i]+' '+esc(famoNL.unit(PRODUCTS[i].unite)||PRODUCTS[i].unite)+'</span><strong>'+eur(PRODUCTS[i].prix*panier[i])+'</strong></div>').join("")+'<div class="total-row"><span>TOTAAL</span><span class="val">'+eur(total)+'</span></div><div class="review-actions"><button type="button" onclick="hideReview()">Aanpassen</button><button type="button" class="confirm" onclick="send()">Definitief opslaan</button></div>';
  box.classList.remove("hidden"); box.scrollIntoView({behavior:"smooth",block:"nearest"});
}

async function send(){
  const keys=Object.keys(panier); if(!keys.length||!CID) return;
  if(send._busy)return; send._busy=true;
  const btn=document.getElementById("sendBtn"); btn.disabled=true; btn.textContent="Opslaan…"; document.querySelectorAll(".review-actions button").forEach(button=>button.disabled=true);
  const shownTotal=keys.reduce((s,i)=>s+PRODUCTS[i].prix*panier[i],0);
  const items=keys.map(i=>({productId:PRODUCTS[i].id,quantity:panier[i],comment:comments[i]||""}));
  try{
    const r=await famoStaff.api("/api/staff",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({clientId:CID,items,notes:document.getElementById("notes").value,dateLivraison:document.getElementById("dateLiv").value,bron:SRC})});
    const d=await r.json();
    const box=document.getElementById("okBox");
    if(!r.ok){ box.style.display="block"; box.style.background="#fef2f2"; box.style.borderColor="#fecaca"; box.style.color="#991b1b"; box.textContent="Fout: "+famoStaff.translateError(d.error||"opslaan mislukt"); btn.disabled=false; btn.textContent="Bestelling controleren"; document.querySelectorAll(".review-actions button").forEach(button=>button.disabled=false); return; }
    const total=typeof d.total==="number"?d.total:shownTotal;
    box.style.display="block";
    box.innerHTML='<b>Bestelling '+esc(d.ref)+' opgeslagen</b><br>Totaal: <b>'+eur(total)+'</b> · Bron: '+esc(SRC)+'<br>Ze staat nu in het magazijn onder « Ontvangen ».';
    panier={}; comments={}; document.getElementById("notes").value="";
    renderCatalogue(); renderCart();
    btn.textContent="Bestelling controleren";
  }catch(e){ const box=document.getElementById("okBox"); box.style.display="block"; box.style.background="#fef2f2"; box.style.borderColor="#fecaca"; box.style.color="#991b1b"; box.textContent=famoStaff.translateError(e.message||"Netwerkfout. Probeer opnieuw."); btn.disabled=false; btn.textContent="Bestelling controleren"; document.querySelectorAll(".review-actions button").forEach(button=>button.disabled=false); }
  finally{send._busy=false}
}
</script>
</body>
</html>
