<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Famo Trading — Leveringen</title>
<link rel="stylesheet" href="/staff.css">
<style>
.l-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:22px}
.l-tools input{width:min(310px,100%)}
.l-list{margin-top:18px;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden}
.l-card{padding:16px 18px;border-bottom:1px solid #f0f0f0}
.l-card:last-child{border:0}
.l-head,.l-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.l-ref{font:500 12.5px Geist Mono,ui-monospace,monospace}
.l-client{font-size:14px;font-weight:500}
.l-address,.l-lines{margin-top:5px;color:#666;font-size:12.5px}
.l-actions{margin-top:13px}
.l-actions a,.l-actions button{min-height:42px;padding:0 12px;border:1px solid #e0e0e0;border-radius:9px;background:#fff;color:#111;font-size:12.5px;text-decoration:none}
.l-actions button.primary{border-color:#111;background:#111;color:#fff}
@media(max-width:600px){.l-tools>*{width:100%}}
</style>
</head>
<body>
<section id="login" class="staff-login">
  <div>
    <h1>Leveringen</h1>
    <p>Bevestig een levering pas na ontvangst door de klant.</p>
    <input id="code" type="password" autocomplete="current-password" placeholder="Personeelscode">
    <button type="button" onclick="enter()">Aanmelden</button>
    <div id="err" class="staff-login-error" role="alert"></div>
  </div>
</section>
<div id="app" class="hidden staff-shell">
  <aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside>
  <nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav>
  <main class="staff-main">
    <div class="staff-page">
      <header class="staff-page-head">
        <div>
          <h1>Leveringen</h1>
          <p>Onderweg, te bevestigen en recent afgehandeld.</p>
        </div>
        <div><button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div>
      </header>
      <div class="l-tools">
        <input id="q" class="staff-field" type="search" placeholder="Zoek klant of referentie…" oninput="render()">
        <select id="filter" class="staff-select" onchange="render()">
          <option value="open">Te bevestigen</option>
          <option value="done">Afgehandeld</option>
          <option value="all">Alles</option>
        </select>
      </div>
      <div id="list" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div>
    </div>
  </main>
</div>
<script src="/staff-session.js"></script>
<script src="/staff-delivery.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ORDERS=[];
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}
function lines(o){return famoNL.lines(String(o.lignes||"").replace(/\s*\[€[^\]]+\]/g,"").replace(/\n/g," · "))}
const loginCtl=famoStaff.bindLogin({code:"code",error:"err",loginView:"login",appView:"app",onReady:load});
function enter(){loginCtl.enter()}
async function logout(){await loginCtl.logout()}
async function load(){
  const box=document.getElementById("list");
  box.className="staff-loading";
  box.innerHTML='<div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div>';
  try{
    const r=await famoStaff.api("/api/allorders"),d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(d.error||"Leveringen konden niet worden geladen.");
    ORDERS=d.orders||[];
    render();
  }catch(e){
    box.className="staff-error";
    box.innerHTML=esc(famoStaff.translateError(e.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>';
  }
}
function render(){
  const q=document.getElementById("q").value.toLowerCase(),f=document.getElementById("filter").value;
  const items=ORDERS.filter(o=>(o.statut==="Sortie en livraison"||o.livraisonConfirmee))
    .filter(o=>f==="all"||(f==="open"&&o.statut==="Sortie en livraison"&&!o.livraisonConfirmee)||(f==="done"&&o.livraisonConfirmee))
    .filter(o=>(o.ref+" "+o.client).toLowerCase().includes(q));
  const box=document.getElementById("list");
  box.className="l-list";
  box.innerHTML=items.length?items.map(o=>'<article class="l-card"><div class="l-head"><span class="l-ref">'+esc(o.ref)+'</span><span class="staff-status" style="--status:'+(o.livraisonConfirmee?'#2e7d53':'#3a8a9c')+'">'+(o.livraisonConfirmee?'Geleverd':'Onderweg')+'</span></div><div class="l-client">'+esc(o.client)+'</div><div class="l-address">'+esc((o.klant||{}).adresse||"Adres niet geregistreerd")+'</div><div class="l-lines">'+esc(lines(o))+'</div><div class="l-actions">'+((o.klant||{}).adresse?'<a target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent((o.klant||{}).adresse)+'">Kaart</a>':'')+'<a href="/order.html?id='+encodeURIComponent(o.id)+'">Bestelling</a>'+(o.livraisonConfirmee?'<span class="staff-status" style="--status:#2e7d53">'+esc(o.receptionnePar||"Ontvangen")+'</span>':'<button class="primary" onclick="confirmDelivery(\''+esc(o.id)+'\')">Levering bevestigen</button>')+'</div></article>').join(""):'<div class="staff-empty">Geen leveringen voor deze selectie.</div>';
}
function confirmDelivery(id){
  const order=ORDERS.find(x=>x.id===id);
  if(!order)return;
  famoStaff.openDeliveryConfirm(order,{onDone:async()=>{await load()},onError:m=>famoStaff.deliveryToast(m,true)});
}
</script>
</body>
</html>
