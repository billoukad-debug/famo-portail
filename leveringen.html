<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Famo Trading — Leveringen</title><link rel="stylesheet" href="/staff.css"><style>.l-login{min-height:100vh;display:grid;place-items:center;padding:20px}.l-login>div{width:min(100%,390px);padding:28px;border:1px solid #e8e8e8;border-radius:14px;background:#fff}.l-login h1{margin:0 0 5px;font-size:20px}.l-login p{color:#666;font-size:13.5px}.l-login input{width:100%;height:42px;padding:0 12px;margin:5px 0 9px}.l-login button{width:100%;height:42px;border:0;border-radius:9px;background:#111;color:#fff}.l-err{min-height:18px;margin-top:8px;color:#b23b2e;font-size:12px}.l-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:22px}.l-tools input{width:min(310px,100%)}.l-list{margin-top:18px;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden}.l-card{padding:16px 18px;border-bottom:1px solid #f0f0f0}.l-card:last-child{border:0}.l-head,.l-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.l-ref{font:500 12.5px Geist Mono,ui-monospace,monospace}.l-client{font-size:14px;font-weight:500}.l-address,.l-lines{margin-top:5px;color:#666;font-size:12.5px}.l-actions{margin-top:13px}.l-actions a,.l-actions button{min-height:42px;padding:0 12px;border:1px solid #e0e0e0;border-radius:9px;background:#fff;color:#111;font-size:12.5px;text-decoration:none}.l-actions button.primary{border-color:#111;background:#111;color:#fff}.l-modal{position:fixed;inset:0;z-index:200;display:grid;place-items:end center;background:rgba(0,0,0,.3);padding:18px}.l-sheet{width:min(620px,100%);padding:20px;border-radius:15px;background:#fff}.l-sheet h2{margin:0;font-size:16px}.l-sheet p{margin:6px 0;color:#666;font-size:13px}.l-sheet label{display:block;margin-top:13px;color:#555;font-size:12.5px}.l-sheet input{display:block;width:100%;height:44px;margin-top:5px;padding:0 11px}.l-sheet-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}@media(max-width:600px){.l-tools>*{width:100%}.l-modal{padding:0}.l-sheet{width:100%;border-radius:15px 15px 0 0}}</style></head><body>
<section id="login" class="l-login"><div><h1>Leveringen</h1><p>Bevestig een levering pas na ontvangst door de klant.</p><input id="code" type="password" placeholder="Personeelscode"><button onclick="enter()">Aanmelden</button><div id="err" class="l-err"></div></div></section><div id="app" class="hidden staff-shell"><aside class="staff-sidebar" data-famo-nav aria-label="Personeelsnavigatie"></aside><nav class="staff-mobile-nav" data-famo-mobile-nav aria-label="Mobiele navigatie"></nav><main class="staff-main"><div class="staff-page"><header class="staff-page-head"><div><h1>Leveringen</h1><p>Onderweg, te bevestigen en recent afgehandeld.</p></div><div><button class="staff-action-secondary" onclick="load()">Vernieuwen</button></div></header><div class="l-tools"><input id="q" class="staff-field" type="search" placeholder="Zoek klant of referentie…" oninput="render()"><select id="filter" class="staff-select" onchange="render()"><option value="open">Te bevestigen</option><option value="done">Afgehandeld</option><option value="all">Alles</option></select></div><div id="list" class="staff-loading"><div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div></div></div></main></div><div id="modal" class="hidden"></div><script src="/staff-session.js"></script>
<script src="/staff-i18n.js"></script>
<script src="/staff-nav.js"></script>
<script>
let ORDERS=[],CURRENT=null,BUSY=false;
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}
function lines(o){return famoNL.lines(String(o.lignes||"").replace(/\s*\[€[^\]]+\]/g,"").replace(/\n/g," · "))}
async function enter(){
  const input=document.getElementById("code"),err=document.getElementById("err");
  const code=(input.value||"").trim();
  if(!code){err.textContent="Vul de personeelscode in.";return}
  if(enter._busy)return;enter._busy=true;
  err.textContent="Controleren…";
  try{
    await famoStaff.login(code);
    input.value="";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await load();
  }catch(e){err.textContent=famoStaff.translateError(e.message||e)}
  finally{enter._busy=false}
}
async function load(){const box=document.getElementById("list");box.className="staff-loading";box.innerHTML='<div class="staff-skeleton" style="max-width:260px;margin:25px auto"></div>';try{const r=await famoStaff.api("/api/allorders"),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Leveringen konden niet worden geladen.");ORDERS=d.orders||[];render()}catch(e){box.className="staff-error";box.innerHTML=esc(famoStaff.translateError(e.message||"Netwerkfout."))+'<br><button class="staff-action-secondary" style="margin-top:12px" onclick="load()">Opnieuw proberen</button>'}}
function render(){const q=document.getElementById("q").value.toLowerCase(),f=document.getElementById("filter").value,items=ORDERS.filter(o=>(o.statut==="Sortie en livraison"||o.livraisonConfirmee)).filter(o=>f==="all"||(f==="open"&&o.statut==="Sortie en livraison"&&!o.livraisonConfirmee)||(f==="done"&&o.livraisonConfirmee)).filter(o=>(o.ref+" "+o.client).toLowerCase().includes(q)),box=document.getElementById("list");box.className="l-list";box.innerHTML=items.length?items.map(o=>'<article class="l-card"><div class="l-head"><span class="l-ref">'+esc(o.ref)+'</span><span class="staff-status" style="--status:'+(o.livraisonConfirmee?'#2e7d53':'#3a8a9c')+'">'+(o.livraisonConfirmee?'Geleverd':'Onderweg')+'</span></div><div class="l-client">'+esc(o.client)+'</div><div class="l-address">'+esc((o.klant||{}).adresse||"Adres niet geregistreerd")+'</div><div class="l-lines">'+esc(lines(o))+'</div><div class="l-actions">'+((o.klant||{}).adresse?'<a target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent((o.klant||{}).adresse)+'">Kaart</a>':'')+'<a href="/order.html?id='+encodeURIComponent(o.id)+'">Bestelling</a>'+(o.livraisonConfirmee?'<span class="staff-status" style="--status:#2e7d53">'+esc(o.receptionnePar||"Ontvangen")+'</span>':'<button class="primary" onclick="confirmDelivery(\''+esc(o.id)+'\')">Levering bevestigen</button>')+'</div></article>').join(""):'<div class="staff-empty">Geen leveringen voor deze selectie.</div>'}
function confirmDelivery(id){CURRENT=ORDERS.find(x=>x.id===id);document.getElementById("modal").className="l-modal";document.getElementById("modal").innerHTML='<div class="l-sheet"><h2>Levering bevestigen</h2><p>'+esc(CURRENT.ref)+' · '+esc(CURRENT.client)+'. Een ontvanger is verplicht; een https-bewijslink is optioneel.</p><label>Ontvangen door<input id="recipient" type="text" placeholder="Naam ontvanger"></label>'+famoStaff.proofFieldsHtml({id:"proof"})+'<div class="l-sheet-actions"><button class="staff-action-secondary" onclick="closeModal()">Annuleren</button><button class="staff-action" id="deliverBtn" onclick="saveDelivery()">Bevestigen en factureren</button></div></div>';famoStaff.bindProofFile("proofFile","proofPreview","proofNote")}
function closeModal(){document.getElementById("modal").className="hidden";document.getElementById("modal").innerHTML=""}
async function saveDelivery(){
  if(BUSY)return;
  const recipient=document.getElementById("recipient").value.trim(),proofUrl=document.getElementById("proof").value.trim();
  if(!recipient)return document.getElementById("recipient").focus();
  if(proofUrl&&!/^https:\/\//i.test(proofUrl))return lvToast("Gebruik een https://-link voor het bewijs.",true);
  BUSY=true;
  const btn=document.getElementById("deliverBtn");
  if(btn)btn.disabled=true;
  document.querySelectorAll(".l-sheet-actions button").forEach(b=>b.disabled=true);
  try{
    const r=await famoStaff.api("/api/updateorder",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:CURRENT.id,statut:"Facturée",deliveryConfirmed:true,recipient,proofUrl})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(d.error||"Bijwerken mislukt.");
    closeModal();await load();
  }catch(e){lvToast(famoStaff.translateError(e.message||"Netwerkfout."),true)}
  finally{BUSY=false;document.querySelectorAll(".l-sheet-actions button").forEach(b=>b.disabled=false)}
}
async function logout(){await famoStaff.logout();location.reload()}
document.getElementById("code").addEventListener("keydown",e=>{if(e.key==="Enter")enter()});
window.addEventListener("DOMContentLoaded",async()=>{
  try{
    if(await famoStaff.check()){
      document.getElementById("login").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      await load();
      return;
    }
  }catch(e){}
});
</script><div id="lvToast" role="status" aria-live="polite" style="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);max-width:90vw;background:#111;color:#fff;padding:10px 15px;border-radius:10px;font-size:13px;z-index:400;display:none"></div><script>let _lvT=null;function lvToast(m,w){const t=document.getElementById("lvToast");t.textContent=m;t.style.background=w?"#9a6700":"#111";t.style.display="block";clearTimeout(_lvT);_lvT=setTimeout(()=>t.style.display="none",4200)}</script></body></html>
