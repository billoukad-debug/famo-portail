<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAMO Seafood — Portail client</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f8; color: #1a2b3c; }
  header { background: #0b3d5c; color: #fff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header .brand { font-size: 20px; font-weight: 700; }
  header .client { font-size: 14px; opacity: .9; }
  .wrap { max-width: 1000px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
  @media (max-width: 820px){ .wrap { grid-template-columns: 1fr; } }
  h2 { font-size: 16px; margin-bottom: 12px; color: #0b3d5c; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 16px; }
  .prod { display: flex; align-items: center; justify-content: space-between; padding: 12px 6px; border-bottom: 1px solid #eef1f4; }
  .prod:last-child { border-bottom: none; }
  .prod .info { flex: 1; }
  .prod .name { font-weight: 600; }
  .prod .meta { font-size: 12px; color: #6b7a89; margin-top: 2px; }
  .prod .price { font-weight: 700; color: #0b3d5c; }
  .prod .base { font-size: 11px; color: #9aa7b4; text-decoration: line-through; margin-left: 6px; font-weight: 400; }
  .qty { display: flex; align-items: center; gap: 8px; margin-left: 14px; }
  .qty button { width: 30px; height: 30px; border: 1px solid #cdd6df; background: #f7f9fb; border-radius: 8px; font-size: 18px; cursor: pointer; color: #0b3d5c; }
  .qty input { width: 52px; height: 30px; text-align: center; border: 1px solid #cdd6df; border-radius: 8px; font-size: 14px; }
  .cart-line { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; }
  .cart-line .l { color: #4a5b6c; }
  .total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; color: #0b3d5c; border-top: 2px solid #eef1f4; margin-top: 10px; padding-top: 10px; }
  .empty { color: #9aa7b4; font-size: 13px; padding: 10px 0; }
  textarea { width: 100%; border: 1px solid #cdd6df; border-radius: 8px; padding: 8px; font-size: 13px; margin-top: 8px; resize: vertical; min-height: 54px; font-family: inherit; }
  .btn { width: 100%; margin-top: 14px; background: #1565c0; color: #fff; border: none; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn:disabled { background: #b7c4d1; cursor: not-allowed; }
  .badge { background: #e3f2fd; color: #1565c0; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
  .confirm { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 13px; display: none; }
  .login { max-width: 380px; margin: 80px auto; text-align: center; }
  .login .card { padding: 30px 24px; }
  .login input { width: 100%; padding: 12px; border: 1px solid #cdd6df; border-radius: 10px; font-size: 15px; margin: 14px 0; }
  .login .logo { font-size: 40px; }
  .err { color: #c62828; font-size: 13px; margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>

<div id="loginView" class="login">
  <div class="card">
    <div class="logo">🐟</div>
    <h2 style="margin-top:8px">FAMO Seafood</h2>
    <p style="font-size:13px;color:#6b7a89">Portail de commande — connectez-vous</p>
    <input id="email" type="email" placeholder="Votre email" value="commande@leponton-test.be">
    <button class="btn" onclick="login()">Se connecter</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="appView" style="display:none">
  <header>
    <div class="brand">🐟 FAMO Seafood</div>
    <div class="client" id="clientInfo"></div>
  </header>
  <div class="wrap">
    <div><div class="card"><h2>Catalogue — vos tarifs</h2><div id="catalogue"></div></div></div>
    <div><div class="card">
      <h2>Votre commande</h2>
      <div id="cart"><div class="empty">Aucun article sélectionné.</div></div>
      <div id="totalBox" style="display:none"><div class="total"><span>Total</span><span id="totalVal">€0,00</span></div></div>
      <textarea id="notes" placeholder="Note pour la livraison (optionnel)…"></textarea>
      <button class="btn" id="sendBtn" disabled onclick="send()">Envoyer la commande</button>
      <div class="confirm" id="confirm"></div>
    </div></div>
  </div>
</div>

<script>
let CLIENT = null, PRODUCTS = [], panier = {};
const eur = n => "€" + Number(n).toFixed(2).replace(".", ",");

async function login(){
  const email = document.getElementById("email").value.trim();
  const err = document.getElementById("loginErr");
  err.textContent = "Connexion…";
  try{
    const r = await fetch("/api/catalogue?email=" + encodeURIComponent(email));
    const d = await r.json();
    if(!r.ok){ err.textContent = d.error || "Erreur"; return; }
    CLIENT = d.client; PRODUCTS = d.products; panier = {};
    document.getElementById("loginView").style.display = "none";
    document.getElementById("appView").style.display = "block";
    document.getElementById("clientInfo").innerHTML = "Connecté : <strong>" + CLIENT.nom + "</strong>" + (CLIENT.adresse ? " · " + CLIENT.adresse.split("\n")[0] : "");
    renderCatalogue(); renderCart();
  }catch(e){ err.textContent = "Erreur réseau"; }
}

function renderCatalogue(){
  document.getElementById("catalogue").innerHTML = PRODUCTS.map((p,i)=>{
    const remise = p.prix < p.base ? '<span class="base">'+eur(p.base)+'</span>' : "";
    const badge = p.prix < p.base ? '<span class="badge">négocié</span>' : "";
    return '<div class="prod"><div class="info"><div class="name">'+p.nom+' '+badge+'</div><div class="meta">'+p.cat+' · <span class="price">'+eur(p.prix)+'</span>'+remise+' / '+p.unite+'</div></div><div class="qty"><button onclick="chg('+i+',-1)">−</button><input id="q'+i+'" type="number" min="0" value="'+(panier[i]||0)+'" onchange="setQ('+i+',this.value)"><button onclick="chg('+i+',1)">+</button></div></div>';
  }).join("");
}
function chg(i,d){ setQ(i,(panier[i]||0)+d); }
function setQ(i,v){ v=Math.max(0,parseInt(v)||0); if(v===0) delete panier[i]; else panier[i]=v; const el=document.getElementById("q"+i); if(el) el.value=v; renderCart(); }
function renderCart(){
  const cart=document.getElementById("cart"); const keys=Object.keys(panier);
  if(!keys.length){ cart.innerHTML='<div class="empty">Aucun article sélectionné.</div>'; document.getElementById("totalBox").style.display="none"; document.getElementById("sendBtn").disabled=true; return; }
  let total=0;
  cart.innerHTML=keys.map(i=>{ const p=PRODUCTS[i],q=panier[i],st=p.prix*q; total+=st; return '<div class="cart-line"><span class="l">'+p.nom+' × '+q+' '+p.unite+'</span><span>'+eur(st)+'</span></div>'; }).join("");
  document.getElementById("totalVal").textContent=eur(total);
  document.getElementById("totalBox").style.display="block";
  document.getElementById("sendBtn").disabled=false;
}
async function send(){
  const keys=Object.keys(panier); if(!keys.length) return;
  const btn=document.getElementById("sendBtn"); btn.disabled=true; btn.textContent="Envoi…";
  const total=keys.reduce((s,i)=>s+PRODUCTS[i].prix*panier[i],0);
  const lignes=keys.map(i=>PRODUCTS[i].nom+' × '+panier[i]+' '+PRODUCTS[i].unite).join("\n");
  try{
    const r=await fetch("/api/order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({clientId:CLIENT.id,lignes:lignes,total:total,notes:document.getElementById("notes").value})});
    const d=await r.json();
    const box=document.getElementById("confirm");
    if(!r.ok){ box.style.display="block"; box.style.background="#ffebee"; box.style.color="#c62828"; box.textContent="Erreur : "+(d.error||"envoi échoué"); btn.disabled=false; btn.textContent="Envoyer la commande"; return; }
    box.style.display="block";
    box.innerHTML='✅ <strong>Commande '+d.ref+' envoyée !</strong><br>Total : <strong>'+eur(total)+'</strong><br>Enregistrée dans Airtable.';
    panier={}; document.getElementById("notes").value=""; renderCatalogue(); renderCart();
    btn.textContent="Envoyer la commande";
    box.scrollIntoView({behavior:"smooth"});
  }catch(e){ btn.disabled=false; btn.textContent="Envoyer la commande"; alert("Erreur réseau"); }
}
document.getElementById("email").addEventListener("keydown",e=>{ if(e.key==="Enter") login(); });
</script>
</body>
</html>
